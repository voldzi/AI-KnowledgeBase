<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>AKB Chat je offline</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #17212b;
        background: #f4f7f8;
      }
      main {
        width: min(560px, 100%);
        padding: 40px;
        border: 1px solid #d8e1e5;
        border-radius: 24px;
        background: #fff;
        box-shadow: 0 18px 45px rgb(15 23 42 / 10%);
      }
      .mark {
        display: grid;
        width: 64px;
        height: 64px;
        place-items: center;
        border-radius: 18px;
        color: #fff;
        background: #0f766e;
        font-size: 22px;
        font-weight: 800;
      }
      h1 { margin: 24px 0 12px; font-size: clamp(28px, 6vw, 42px); line-height: 1.05; }
      p { margin: 0; color: #526170; font-size: 18px; line-height: 1.55; }
      button {
        margin-top: 28px;
        padding: 12px 18px;
        border: 0;
        border-radius: 12px;
        color: #fff;
        background: #0f766e;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">AKB</div>
      <h1>AKB Chat je offline</h1>
      <p>
        Chráněné konverzace ani dokumenty se do zařízení neukládají.
        Po obnovení připojení stránku načtěte znovu.
      </p>
      <button type="button" onclick="window.location.reload()">Zkusit znovu</button>
    </main>
  </body>
</html>
