openapi: 3.1.0
info:
  title: AKL Identity & Document Registry API
  description: Registry service for controlled documents, versions, access policies,
    authorization decisions, and audit events. It does not implement ingestion, RAG,
    or LLM logic.
  version: dev
paths:
  /health:
    get:
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      summary: Ready
      operationId: ready_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Ready Ready Get
  /api/v1/external-documents/upsert:
    post:
      summary: Upsert External Document
      operationId: upsert_external_document_api_v1_external_documents_upsert_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalDocumentUpsertRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalDocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/external-documents/{external_document_id}:
    get:
      summary: Get External Document
      operationId: get_external_document_api_v1_external_documents__external_document_id__get
      parameters:
      - name: external_document_id
        in: path
        required: true
        schema:
          type: string
          title: External Document Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalDocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/documents:
    post:
      summary: Create Document
      operationId: create_document_api_v1_documents_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      summary: List Documents
      operationId: list_documents_api_v1_documents_get
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/DocumentStatus'
          - type: 'null'
          title: Status
      - name: classification
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/Classification'
          - type: 'null'
          title: Classification
      - name: document_type
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/DocumentType'
          - type: 'null'
          title: Document Type
      - name: owner_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Owner Id
      - name: tag
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Tag
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 100
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/documents/{document_id}:
    get:
      summary: Get Document
      operationId: get_document_api_v1_documents__document_id__get
      parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
          title: Document Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      summary: Patch Document
      operationId: patch_document_api_v1_documents__document_id__patch
      parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
          title: Document Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentPatch'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Document
      operationId: delete_document_api_v1_documents__document_id__delete
      parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
          title: Document Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/documents/{document_id}/assignments:
    get:
      summary: List Document Assignments
      operationId: list_document_assignments_api_v1_documents__document_id__assignments_get
      parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
          title: Document Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentAssignmentListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      summary: Replace Document Assignments
      operationId: replace_document_assignments_api_v1_documents__document_id__assignments_put
      parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
          title: Document Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentAssignmentReplaceRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentAssignmentListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/documents/{document_id}/versions:
    post:
      summary: Create Document Version
      operationId: create_document_version_api_v1_documents__document_id__versions_post
      parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
          title: Document Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentVersionCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      summary: List Document Versions
      operationId: list_document_versions_api_v1_documents__document_id__versions_get
      parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
          title: Document Id
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/DocumentStatus'
          - type: 'null'
          title: Status
      - name: valid_on
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          title: Valid On
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 100
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/documents/{document_id}/versions/{version_id}:
    get:
      summary: Get Document Version
      operationId: get_document_version_api_v1_documents__document_id__versions__version_id__get
      parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
          title: Document Id
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/documents/{document_id}/versions/{version_id}/publish:
    post:
      summary: Publish Document Version
      operationId: publish_document_version_api_v1_documents__document_id__versions__version_id__publish_post
      parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
          title: Document Id
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/documents/{document_id}/versions/{version_id}/archive:
    post:
      summary: Archive Document Version
      operationId: archive_document_version_api_v1_documents__document_id__versions__version_id__archive_post
      parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
          title: Document Id
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/authz/check:
    post:
      summary: Check Authorization
      operationId: check_authorization_api_v1_authz_check_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthzCheckRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthzCheckResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/authz/filter-documents:
    post:
      summary: Filter Authorized Documents
      operationId: filter_authorized_documents_api_v1_authz_filter_documents_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthzFilterDocumentsRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthzFilterDocumentsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/workflow/tasks:
    get:
      summary: List Workflow Tasks
      operationId: list_workflow_tasks_api_v1_workflow_tasks_get
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/WorkflowTaskStatus'
          - type: 'null'
          title: Status
      - name: kind
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/WorkflowTaskKind'
          - type: 'null'
          title: Kind
      - name: priority
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/WorkflowTaskPriority'
          - type: 'null'
          title: Priority
      - name: document_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Document Id
      - name: owner_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Owner Id
      - name: include_resolved
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Resolved
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 100
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowTaskListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/workflow/tasks/{task_id}/actions:
    post:
      summary: Apply Workflow Task Action
      operationId: apply_workflow_task_action_api_v1_workflow_tasks__task_id__actions_post
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          title: Task Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowTaskActionRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowTaskResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit/events:
    post:
      summary: Create Audit Event
      operationId: create_audit_event_api_v1_audit_events_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditEventCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      summary: List Audit Events
      operationId: list_audit_events_api_v1_audit_events_get
      parameters:
      - name: actor_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Actor Id
      - name: event_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Event Type
      - name: resource_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Resource Type
      - name: resource_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Resource Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 100
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit/events/{event_id}:
    get:
      summary: Get Audit Event
      operationId: get_audit_event_api_v1_audit_events__event_id__get
      parameters:
      - name: event_id
        in: path
        required: true
        schema:
          type: string
          title: Event Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/external-documents/{external_document_id}/current:
    patch:
      summary: Update External Document Current
      operationId: update_external_document_current_api_v1_external_documents__external_document_id__current_patch
      parameters:
      - name: external_document_id
        in: path
        required: true
        schema:
          type: string
          title: External Document Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalDocumentCurrentUpdateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalDocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AccessPolicyCreate:
      properties:
        subjects:
          items:
            type: string
          type: array
          minItems: 1
          title: Subjects
        actions:
          items:
            $ref: '#/components/schemas/Action'
          type: array
          minItems: 1
          title: Actions
        constraints:
          additionalProperties: true
          type: object
          title: Constraints
      type: object
      required:
      - subjects
      - actions
      title: AccessPolicyCreate
    AccessPolicyResponse:
      properties:
        subjects:
          items:
            type: string
          type: array
          minItems: 1
          title: Subjects
        actions:
          items:
            $ref: '#/components/schemas/Action'
          type: array
          minItems: 1
          title: Actions
        constraints:
          additionalProperties: true
          type: object
          title: Constraints
        policy_id:
          type: string
          title: Policy Id
        document_id:
          type: string
          title: Document Id
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      type: object
      required:
      - subjects
      - actions
      - policy_id
      - document_id
      - created_at
      - updated_at
      title: AccessPolicyResponse
    Action:
      type: string
      enum:
      - document.create
      - document.read
      - document.update
      - document.delete
      - document.version.create
      - document.version.publish
      - document.version.archive
      - document.ingest
      - document.reindex
      - rag.query
      - rag.compare
      - rag.check_compliance
      - workflow.task.read
      - workflow.task.write
      - audit.read
      - audit.write
      - admin.manage
      title: Action
    AssignmentSubjectType:
      type: string
      enum:
      - user
      - group
      - unit
      - service
      title: AssignmentSubjectType
    AuditEventCreate:
      properties:
        actor_id:
          type: string
          maxLength: 128
          minLength: 1
          title: Actor Id
        event_type:
          type: string
          maxLength: 160
          minLength: 1
          title: Event Type
        resource_type:
          type: string
          maxLength: 80
          minLength: 1
          title: Resource Type
        resource_id:
          type: string
          maxLength: 128
          minLength: 1
          title: Resource Id
        severity:
          $ref: '#/components/schemas/AuditSeverity'
          default: info
        correlation_id:
          anyOf:
          - type: string
            maxLength: 128
          - type: 'null'
          title: Correlation Id
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - actor_id
      - event_type
      - resource_type
      - resource_id
      title: AuditEventCreate
    AuditEventListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/AuditEventResponse'
          type: array
          title: Items
        limit:
          type: integer
          title: Limit
        offset:
          type: integer
          title: Offset
      type: object
      required:
      - items
      - limit
      - offset
      title: AuditEventListResponse
    AuditEventResponse:
      properties:
        audit_event_id:
          type: string
          title: Audit Event Id
        actor_id:
          type: string
          title: Actor Id
        event_type:
          type: string
          title: Event Type
        resource_type:
          type: string
          title: Resource Type
        resource_id:
          type: string
          title: Resource Id
        severity:
          $ref: '#/components/schemas/AuditSeverity'
        correlation_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Correlation Id
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - audit_event_id
      - actor_id
      - event_type
      - resource_type
      - resource_id
      - severity
      - correlation_id
      - created_at
      title: AuditEventResponse
    AuditSeverity:
      type: string
      enum:
      - debug
      - info
      - warning
      - error
      - critical
      title: AuditSeverity
    AuthzCheckRequest:
      properties:
        subject_id:
          type: string
          maxLength: 128
          minLength: 1
          title: Subject Id
        action:
          $ref: '#/components/schemas/Action'
        resource:
          $ref: '#/components/schemas/AuthzResource'
        roles:
          items:
            type: string
          type: array
          title: Roles
        groups:
          items:
            type: string
          type: array
          title: Groups
      type: object
      required:
      - subject_id
      - action
      title: AuthzCheckRequest
    AuthzCheckResponse:
      properties:
        allowed:
          type: boolean
          title: Allowed
        reason:
          type: string
          title: Reason
        constraints:
          additionalProperties: true
          type: object
          title: Constraints
      type: object
      required:
      - allowed
      - reason
      title: AuthzCheckResponse
    AuthzFilterDocumentsRequest:
      properties:
        subject_id:
          type: string
          maxLength: 128
          minLength: 1
          title: Subject Id
        action:
          $ref: '#/components/schemas/Action'
        candidate_document_ids:
          items:
            type: string
          type: array
          maxItems: 1000
          minItems: 1
          title: Candidate Document Ids
        roles:
          items:
            type: string
          type: array
          title: Roles
        groups:
          items:
            type: string
          type: array
          title: Groups
      type: object
      required:
      - subject_id
      - action
      - candidate_document_ids
      title: AuthzFilterDocumentsRequest
    AuthzFilterDocumentsResponse:
      properties:
        allowed_document_ids:
          items:
            type: string
          type: array
          title: Allowed Document Ids
        denied_document_ids:
          items:
            type: string
          type: array
          title: Denied Document Ids
      type: object
      required:
