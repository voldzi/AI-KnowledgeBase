openapi: 3.1.0
info:
  title: AKL RAG Retrieval Service
  description: Hybrid retrieval, permission-aware reranking, answer composition, citations,
    confidence, and no-answer policy for AKB Platform.
  version: dev
paths:
  /health:
    get:
      tags:
      - health
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      tags:
      - health
      summary: Ready
      operationId: ready_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: At least one dependency is not ready.
  /api/v1/rag/retrieve:
    post:
      tags:
      - rag
      summary: Retrieve
      operationId: retrieve_api_v1_rag_retrieve_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrieveRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/rag/query:
    post:
      tags:
      - rag
      summary: Query
      operationId: query_api_v1_rag_query_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagQueryRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagAnswer'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/rag/query-stream:
    post:
      tags:
      - rag
      summary: Query Stream
      operationId: query_stream_api_v1_rag_query_stream_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagQueryRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/rag/answer:
    post:
      tags:
      - rag
      summary: Answer
      operationId: answer_api_v1_rag_answer_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagAnswer'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/chunks/{chunk_id}/source-context:
    get:
      tags:
      - viewer
      summary: Chunk Source Context
      operationId: chunk_source_context_api_v1_chunks__chunk_id__source_context_get
      parameters:
      - name: chunk_id
        in: path
        required: true
        schema:
          type: string
          title: Chunk Id
      - name: subject_id
        in: query
        required: false
        schema:
          type: string
          default: user_dev
          title: Subject Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceContextResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/citations/{chunk_id}/open:
    get:
      tags:
      - viewer
      summary: Open Citation
      operationId: open_citation_api_v1_citations__chunk_id__open_get
      parameters:
      - name: chunk_id
        in: path
        required: true
        schema:
          type: string
          title: Chunk Id
      - name: subject_id
        in: query
        required: false
        schema:
          type: string
          default: user_dev
          title: Subject Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceContextResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/citations/{chunk_id}/open:
    get:
      tags:
      - assistant
      summary: Open Assistant Citation
      operationId: open_assistant_citation_api_v1_assistant_citations__chunk_id__open_get
      parameters:
      - name: chunk_id
        in: path
        required: true
        schema:
          type: string
          title: Chunk Id
      - name: subject_id
        in: query
        required: false
        schema:
          type: string
          default: user_dev
          title: Subject Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceContextResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/chat:
    post:
      tags:
      - assistant
      summary: Assistant Chat
      operationId: assistant_chat_api_v1_assistant_chat_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantChatRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantChatResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/clarify:
    post:
      tags:
      - assistant
      summary: Assistant Clarify
      operationId: assistant_clarify_api_v1_assistant_clarify_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantChatRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantChatResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/suggestions:
    get:
      tags:
      - assistant
      summary: Assistant Suggestions
      operationId: assistant_suggestions_api_v1_assistant_suggestions_get
      parameters:
      - name: response_language
        in: query
        required: false
        schema:
          enum:
          - cs
          - en
          type: string
          default: cs
          title: Response Language
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantSuggestionsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/conversations/{conversation_id}:
    get:
      tags:
      - assistant
      summary: Assistant Conversation
      operationId: assistant_conversation_api_v1_assistant_conversations__conversation_id__get
      parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          title: Conversation Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantConversationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/stratos/extractions/profiles:
    get:
      tags:
      - stratos-extractions
      summary: Stratos Extraction Profiles
      operationId: stratos_extraction_profiles_api_v1_stratos_extractions_profiles_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractExtractionProfilesResponse'
  /api/v1/stratos/extractions/contracts/propose:
    post:
      tags:
      - stratos-extractions
      summary: Propose Contract Extraction
      operationId: propose_contract_extraction_api_v1_stratos_extractions_contracts_propose_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractExtractionProposeRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractExtractionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/stratos/extractions/{extraction_id}:
    get:
      tags:
      - stratos-extractions
      summary: Get Stratos Extraction
      operationId: get_stratos_extraction_api_v1_stratos_extractions__extraction_id__get
      parameters:
      - name: extraction_id
        in: path
        required: true
        schema:
          type: string
          title: Extraction Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractExtractionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/stratos/extractions/{extraction_id}/feedback:
    post:
      tags:
      - stratos-extractions
      summary: Record Stratos Extraction Feedback
      operationId: record_stratos_extraction_feedback_api_v1_stratos_extractions__extraction_id__feedback_post
      parameters:
      - name: extraction_id
        in: path
        required: true
        schema:
          type: string
          title: Extraction Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractExtractionFeedbackRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractExtractionFeedbackResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/rag/compare-documents:
    post:
      tags:
      - rag
      summary: Compare Documents
      operationId: compare_documents_api_v1_rag_compare_documents_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              type: object
              title: Payload
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Compare Documents Api V1 Rag Compare Documents Post
        '502':
          description: Governance service is unavailable.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/rag/check-compliance:
    post:
      tags:
      - rag
      summary: Check Compliance
      operationId: check_compliance_api_v1_rag_check_compliance_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              type: object
              title: Payload
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Check Compliance Api V1 Rag Check Compliance Post
        '502':
          description: Governance service is unavailable.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AnswerRequest:
      properties:
        subject_id:
          type: string
          minLength: 1
          title: Subject Id
        query:
          type: string
          maxLength: 4000
          minLength: 1
          title: Query
        chunks:
          items:
            $ref: '#/components/schemas/RetrievedChunk'
          type: array
          title: Chunks
        answer_mode:
          type: string
          enum:
          - ask
          - standard_answer
          - normative_with_citations
          - normative_answer_with_citations
          - retrieve_only
          - compare
          - compare_documents
          - summary
          - extract_obligations
          - extract_roles
          - extract_deadlines
          - extract_risks
          - find_procedure
          - find_owner
          - find_responsibility
          - create_checklist
          - create_faq
          - create_kb_article
          - find_conflicts
          - find_missing_metadata
          - explain_process
          - it_support_answer
          - manager_brief
          - audit_question
          title: Answer Mode
          default: normative_with_citations
        max_chunks:
          type: integer
          maximum: 20.0
          minimum: 1.0
          title: Max Chunks
          default: 8
        response_language:
          type: string
          enum:
          - cs
          - en
          title: Response Language
          default: cs
      additionalProperties: false
      type: object
      required:
      - subject_id
      - query
      title: AnswerRequest
    AssistantChatRequest:
      properties:
        user_id:
          type: string
          minLength: 1
          title: User Id
        conversation_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Conversation Id
        message:
          type: string
          maxLength: 4000
          minLength: 1
          title: Message
        context:
          additionalProperties: true
          type: object
          title: Context
        mode:
          type: string
          enum:
          - ask
          - standard_answer
          - normative_with_citations
          - normative_answer_with_citations
          - retrieve_only
          - compare
          - compare_documents
          - summary
          - extract_obligations
          - extract_roles
          - extract_deadlines
          - extract_risks
          - find_procedure
          - find_owner
          - find_responsibility
          - create_checklist
          - create_faq
          - create_kb_article
          - find_conflicts
          - find_missing_metadata
          - explain_process
          - it_support_answer
          - manager_brief
          - audit_question
          title: Mode
          default: it_support_answer
        response_language:
          type: string
          enum:
          - cs
          - en
          title: Response Language
          default: cs
      additionalProperties: false
      type: object
      required:
      - user_id
      - message
      title: AssistantChatRequest
    AssistantChatResponse:
      properties:
        response_type:
          type: string
          enum:
          - answer
          - clarification_needed
          - no_answer
          - restricted
          - handoff_recommended
          title: Response Type
        conversation_id:
          type: string
          title: Conversation Id
        answer:
          anyOf:
          - type: string
          - type: 'null'
          title: Answer
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
        questions:
          items:
            $ref: '#/components/schemas/ClarificationQuestion'
          type: array
          title: Questions
        why_needed:
          anyOf:
          - type: string
          - type: 'null'
          title: Why Needed
        current_context:
          additionalProperties: true
          type: object
          title: Current Context
        citations:
          items:
            $ref: '#/components/schemas/Citation'
          type: array
          title: Citations
        follow_up_questions:
          items:
            type: string
          type: array
          title: Follow Up Questions
        suggested_actions:
          items:
            $ref: '#/components/schemas/AssistantSuggestedAction'
          type: array
          title: Suggested Actions
        confidence:
          anyOf:
          - type: string
            enum:
            - high
            - medium
            - low
            - insufficient_source
            - conflicting_sources
          - type: 'null'
          title: Confidence
        warnings:
          items:
            type: string
          type: array
          title: Warnings
        missing_information:
          anyOf:
          - type: string
          - type: 'null'
          title: Missing Information
        recommended_action:
          anyOf:
          - type: string
          - type: 'null'
          title: Recommended Action
      type: object
      required:
      - response_type
      - conversation_id
      title: AssistantChatResponse
    AssistantConversationResponse:
      properties:
        conversation_id:
          type: string
          title: Conversation Id
        status:
          type: string
          enum:
          - ephemeral
          - persisted
          title: Status
        messages:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Messages
        warnings:
          items:
            type: string
          type: array
          title: Warnings
      type: object
      required:
      - conversation_id
      - status
      title: AssistantConversationResponse
    AssistantSuggestedAction:
      properties:
        label:
          type: string
          title: Label
        action_type:
          type: string
          title: Action Type
        target:
          anyOf:
          - type: string
          - type: 'null'
          title: Target
      type: object
      required:
      - label
      - action_type
      title: AssistantSuggestedAction
    AssistantSuggestion:
      properties:
        label:
          type: string
          title: Label
        prompt:
          type: string
          title: Prompt
        domain:
          type: string
          title: Domain
        audience:
          type: string
          title: Audience
          default: employee
      type: object
      required:
      - label
      - prompt
      - domain
      title: AssistantSuggestion
    AssistantSuggestionsResponse:
      properties:
        suggestions:
          items:
            $ref: '#/components/schemas/AssistantSuggestion'
          type: array
          title: Suggestions
      type: object
      required:
      - suggestions
      title: AssistantSuggestionsResponse
    ChunkCitation:
      properties:
        document_id:
          type: string
          minLength: 1
          title: Document Id
        document_version_id:
          type: string
          minLength: 1
          title: Document Version Id
        document_title:
          type: string
          minLength: 1
          title: Document Title
        version_label:
          type: string
          minLength: 1
          title: Version Label
        document_version:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Document Version
        page_number:
          anyOf:
          - type: integer
            minimum: 1.0
          - type: 'null'
          title: Page Number
        section_path:
          items:
            type: string
          type: array
          title: Section Path
        article_number:
          anyOf:
          - type: string
          - type: 'null'
          title: Article Number
        paragraph_number:
          anyOf:
          - type: string
          - type: 'null'
          title: Paragraph Number
      additionalProperties: false
      type: object
      required:
      - document_id
      - document_version_id
      - document_title
      - version_label
      title: ChunkCitation
    Citation:
      properties:
        document_id:
          type: string
          minLength: 1
          title: Document Id
        document_version_id:
          type: string
          minLength: 1
          title: Document Version Id
        document_title:
          type: string
          minLength: 1
          title: Document Title
        version_label:
          type: string
          minLength: 1
          title: Version Label
        document_version:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Document Version
        section_path:
          items:
            type: string
          type: array
          title: Section Path
        page_number:
          anyOf:
          - type: integer
            minimum: 1.0
          - type: 'null'
          title: Page Number
        chunk_id:
          type: string
          minLength: 1
          title: Chunk Id
      additionalProperties: false
      type: object
      required:
      - document_id
      - document_version_id
      - document_title
      - version_label
      - chunk_id
      title: Citation
    ClarificationQuestion:
      properties:
        id:
          type: string
          title: Id
        question:
          type: string
          title: Question
        type:
          type: string
          enum:
          - free_text
          - single_choice
          title: Type
        options:
          items:
            type: string
          type: array
          title: Options
      type: object
      required:
      - id
      - question
      - type
      title: ClarificationQuestion
    ContractExtractionCitation:
      properties:
        document_id:
          type: string
          title: Document Id
        document_version_id:
          type: string
          title: Document Version Id
        chunk_id:
          type: string
          title: Chunk Id
        page_number:
          anyOf:
          - type: integer
            minimum: 1.0
          - type: 'null'
          title: Page Number
        section_path:
          items:
            type: string
          type: array
          title: Section Path
        section:
          anyOf:
          - type: string
          - type: 'null'
          title: Section
        quoted_text:
          type: string
          title: Quoted Text
        viewer_url:
          type: string
          title: Viewer Url
        warnings:
          items:
            type: string
          type: array
          title: Warnings
      type: object
      required:
      - document_id
      - document_version_id
      - chunk_id
      - quoted_text
      - viewer_url
      title: ContractExtractionCitation
    ContractExtractionFeedbackRequest:
      properties:
        field:
          type: string
          maxLength: 160
          minLength: 1
          title: Field
        ai_value:
          anyOf:
          - {}
          - type: 'null'
          title: Ai Value
        final_value:
          anyOf:
          - {}
          - type: 'null'
          title: Final Value
        decision:
          type: string
          enum:
          - accepted
          - rejected
          - edited
          title: Decision
        reason:
          anyOf:
          - type: string
            maxLength: 2000
          - type: 'null'
          title: Reason
        actor:
          type: string
          maxLength: 128
          minLength: 1
          title: Actor
        source_app:
          type: string
          const: STRATOS_BUDGET
          title: Source App
          default: STRATOS_BUDGET
        source_entity_id:
          type: string
          maxLength: 128
          minLength: 1
          title: Source Entity Id
        correlation_id:
          anyOf:
          - type: string
            maxLength: 128
          - type: 'null'
          title: Correlation Id
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      additionalProperties: false
      type: object
      required:
      - field
      - decision
      - actor
      - source_entity_id
      title: ContractExtractionFeedbackRequest
    ContractExtractionFeedbackResponse:
      properties:
        feedback_id:
          type: string
          title: Feedback Id
        extraction:
          $ref: '#/components/schemas/ContractExtractionResponse'
      type: object
      required:
      - feedback_id
      - extraction
      title: ContractExtractionFeedbackResponse
    ContractExtractionProfile:
      properties:
        profile:
          type: string
          title: Profile
        profile_version:
          type: string
          title: Profile Version
        title:
          type: string
          title: Title
        description:
          type: string
          title: Description
        supported_external_systems:
          items:
            type: string
          type: array
          title: Supported External Systems
        fields:
          items:
            type: string
          type: array
          title: Fields
      type: object
      required:
      - profile
      - profile_version
      - title
      - description
      - supported_external_systems
      - fields
      title: ContractExtractionProfile
    ContractExtractionProfilesResponse:
      properties:
        profiles:
          items:
            $ref: '#/components/schemas/ContractExtractionProfile'
          type: array
          title: Profiles
      type: object
      required:
      - profiles
      title: ContractExtractionProfilesResponse
    ContractExtractionProposeRequest:
      properties:
        tenant_id:
          type: string
          maxLength: 128
          minLength: 1
          title: Tenant Id
        external_system:
          type: string
          const: STRATOS_BUDGET
          title: External System
          default: STRATOS_BUDGET
        external_ref:
          type: string
          maxLength: 240
          minLength: 1
          title: External Ref
        entity_type:
          type: string
          maxLength: 80
          minLength: 1
          title: Entity Type
        entity_id:
          type: string
          maxLength: 128
          minLength: 1
          title: Entity Id
        document_id:
          type: string
          maxLength: 64
          minLength: 1
