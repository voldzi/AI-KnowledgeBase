name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standards:
    name: Repository Standards
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Validate skeleton
        run: bash scripts/validate-skeleton.sh

      - name: Verify generated OpenAPI is current
        run: ruby scripts/generate_openapi_index.rb --check

      - name: Validate OpenAPI JSON
        run: python3 -m json.tool openapi/openapi.json >/tmp/akb-openapi.json

      - name: Lint OpenAPI
        run: npx --yes @redocly/cli lint openapi/openapi.json

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end test
        run: npm run test:e2e

  python-services:
    name: Python / ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: registry-api
            working-directory: services/registry-api
            dependency-file: services/registry-api/pyproject.toml
            install-command: python -m pip install -e ".[test]"
          - service: ingestion-service
            working-directory: services/ingestion-service
            dependency-file: services/ingestion-service/requirements.txt
            install-command: python -m pip install -r requirements.txt
          - service: rag-retrieval-service
            working-directory: services/rag-retrieval-service
            dependency-file: services/rag-retrieval-service/requirements.txt
            install-command: python -m pip install -r requirements.txt
          - service: llm-gateway-service
            working-directory: services/llm-gateway-service
            dependency-file: services/llm-gateway-service/requirements.txt
            install-command: python -m pip install -r requirements.txt
          - service: evaluation-service
            working-directory: services/evaluation-service
            dependency-file: services/evaluation-service/requirements.txt
            install-command: python -m pip install -r requirements.txt
          - service: governance-service
            working-directory: services/governance-service
            dependency-file: services/governance-service/requirements.txt
            install-command: python -m pip install -r requirements.txt

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.dependency-file }}

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.install-command }}

      - name: Run tests
        working-directory: ${{ matrix.working-directory }}
        env:
          PYTHONPATH: .
        run: python -m pytest

  registry-postgres:
    name: Registry API / PostgreSQL
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: akl
          POSTGRES_USER: akl_platform
          POSTGRES_PASSWORD: akl_local_postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U akl_platform -d akl"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/registry-api/pyproject.toml

      - name: Install Registry API dependencies
        working-directory: services/registry-api
        run: python -m pip install -e ".[test]"

      - name: Run PostgreSQL migration and integration smoke
        env:
          AKL_REGISTRY_PG_ADMIN_URL: postgresql://akl_platform:akl_local_postgres@localhost:5432/akl
          AKL_REGISTRY_PG_DATABASE: akl_registry_smoke
        run: python scripts/registry_postgres_smoke.py

  compose:
    name: Docker Compose Config
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate development compose config
        run: |
          docker compose \
            --env-file .env.example \
            -f infra/docker-compose/docker-compose.dev.yml \
            config >/tmp/akl-compose-dev.yml

      - name: Validate local production compose config
        run: |
          docker compose \
            --env-file .env.local-prod.example \
            -f infra/docker-compose/docker-compose.dev.yml \
            -f infra/docker-compose/docker-compose.local-prod.yml \
            config >/tmp/akl-compose-local-prod.yml

      - name: Validate docker.home.cz compose config
        run: |
          printf '@voldzi:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=dummy\n' >/tmp/akl-npmrc
          AKL_NPMRC_SECRET_FILE=/tmp/akl-npmrc docker compose \
            --env-file infra/docker-compose/docker-home.env.example \
            -f infra/docker-compose/docker-compose.docker-home.yml \
            config >/tmp/akl-compose-docker-home.yml
