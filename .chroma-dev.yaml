indexing:
  include:
    - "README*"
    - "AGENTS.md"
    - "CLAUDE.md"
    - "docs/**/*.md"
    - "apps/**/*.ts"
    - "apps/**/*.tsx"
    - "apps/**/*.js"
    - "apps/**/*.jsx"
    - "apps/**/*.css"
    - "apps/**/*.md"
    - "services/**/*.py"
    - "services/**/*.yaml"
    - "services/**/*.yml"
    - "services/**/*.json"
    - "services/**/*.md"
    - "scripts/**/*.py"
    - "scripts/**/*.sh"
    - "tests/**/*.py"
    - "tests/**/*.ts"
    - "tests/**/*.tsx"
    - "tools/**/*.py"
    - "tools/**/*.sh"
    - "infra/**/*.yml"
    - "infra/**/*.yaml"
    - "infra/**/*.json"
    - "infra/**/*.md"
  exclude:
    - ".git/**"
    - "**/.git/**"
    - ".venv/**"
    - "**/.venv/**"
    - "node_modules/**"
    - "**/node_modules/**"
    - "dist/**"
    - "**/dist/**"
    - "build/**"
    - "**/build/**"
    - ".next/**"
    - "**/.next/**"
    - ".chroma-data/**"
    - "**/.chroma-data/**"
    - ".chroma-state/**"
    - "**/.chroma-state/**"
    - "**/.DS_Store"
    - "**/__pycache__/**"
    - "**/*.pyc"
