indexing:
  include:
    - "README*"
    - "AGENTS.md"
    - "CLAUDE.md"
    - ".github/**/*.yml"
    - ".github/**/*.yaml"
    - "docs/**/*.md"
    - "openapi/**/*.json"
    - "apps/**/*.ts"
    - "apps/**/*.tsx"
    - "apps/**/*.js"
    - "apps/**/*.jsx"
    - "apps/**/*.css"
    - "apps/**/*.md"
    - "services/**/*.py"
    - "services/**/*.yaml"
    - "services/**/*.yml"
    - "services/**/*.json"
    - "services/**/*.md"
    - "scripts/**/*.py"
    - "scripts/**/*.sh"
    - "tests/**/*.py"
    - "tests/**/*.ts"
    - "tests/**/*.tsx"
    - "tools/**/*.py"
    - "tools/**/*.sh"
    - "infra/**/*.yml"
    - "infra/**/*.yaml"
    - "infra/**/*.json"
    - "infra/**/*.md"
    - "infra/reverse-proxy/Caddyfile*"
    - "infra/monitoring/**/*.yml"
    - "infra/monitoring/**/*.yaml"
    - "infra/monitoring/**/*.json"
  exclude:
    - ".git/**"
    - "**/.git/**"
    - ".venv/**"
    - "**/.venv/**"
    - "node_modules/**"
    - "**/node_modules/**"
    - "dist/**"
    - "**/dist/**"
    - "build/**"
    - "**/build/**"
    - ".next/**"
    - "**/.next/**"
    - ".chroma-data/**"
    - "**/.chroma-data/**"
    - ".chroma-state/**"
    - "**/.chroma-state/**"
    - "**/.DS_Store"
    - "**/* 2.*"
    - "**/__pycache__/**"
    - "**/*.pyc"
