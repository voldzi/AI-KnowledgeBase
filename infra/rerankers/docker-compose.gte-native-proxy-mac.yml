name: akb-gte-reranker-proxy-mac

services:
  gte-reranker-proxy:
    image: alpine/socat@sha256:beb4a68d9e4fe6b0f21ea774a0fde6c31f580dde6368939ed70100c5385b015e
    restart: unless-stopped
    command:
      - TCP-LISTEN:11438,fork,reuseaddr
      - TCP:host.docker.internal:11441
    ports:
      - "${GTE_RERANKER_BIND_ADDRESS:-0.0.0.0}:${GTE_RERANKER_PORT:-11438}:11438"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 64m
    cpus: 0.25
    healthcheck:
      test: ["CMD-SHELL", "socat -T 2 -u /dev/null TCP:host.docker.internal:11441"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
