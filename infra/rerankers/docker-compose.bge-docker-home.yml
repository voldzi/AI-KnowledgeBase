name: akb-bge-reranker

services:
  bge-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9@sha256:ad950d30878eceb72aaf32024d26fa2b1d04a75304fa0b4776b49aa1941fea07
    restart: unless-stopped
    command:
      - --model-id
      - BAAI/bge-reranker-v2-m3
      - --revision
      - 953dc6f6f85a1b2dbfca4c34a2796e7dde08d41e
      - --served-model-name
      - bge-reranker-v2-m3
      - --port
      - "3000"
      - --dtype
      - float32
      - --max-concurrent-requests
      - "16"
      - --max-client-batch-size
      - "50"
      - --max-batch-tokens
      - "2048"
      - --tokenization-workers
      - "2"
      - --payload-limit
      - "2000000"
      - --json-output
    volumes:
      - bge_reranker_cache:/data
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 6g
    cpus: 4.0
    networks:
      app_zone:
        aliases:
          - bge-reranker

volumes:
  bge_reranker_cache:

networks:
  app_zone:
    external: true
    name: akl_app_zone
