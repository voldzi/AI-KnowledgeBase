name: akb-gte-reranker-proxy

services:
  gte-vpn-200-3:
    image: alpine/socat@sha256:beb4a68d9e4fe6b0f21ea774a0fde6c31f580dde6368939ed70100c5385b015e
    restart: unless-stopped
    network_mode: host
    command:
      - TCP-LISTEN:11438,fork,reuseaddr,bind=10.246.241.1
      - TCP:192.168.200.3:11438,connect-timeout=3
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 128

  gte-vpn-200-2:
    image: alpine/socat@sha256:beb4a68d9e4fe6b0f21ea774a0fde6c31f580dde6368939ed70100c5385b015e
