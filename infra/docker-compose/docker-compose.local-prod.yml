name: ${COMPOSE_PROJECT_NAME:-akl}

services:
  llm-gateway-service:
    environment:
      AKL_LLM_DEFAULT_PROVIDER: ${AKL_LLM_DEFAULT_PROVIDER:-ollama}
      AKL_LLM_ENABLED_PROVIDERS: ${AKL_LLM_ENABLED_PROVIDERS:-mock,ollama}
      AKL_LLM_DEFAULT_CHAT_MODEL: ${AKL_LLM_DEFAULT_CHAT_MODEL:-gemma4:12b-mlx}
      AKL_LLM_DEFAULT_EMBEDDING_MODEL: ${AKL_LLM_DEFAULT_EMBEDDING_MODEL:-bge-m3}
      AKL_LLM_DEFAULT_EMBEDDING_DIMENSIONS: ${AKL_LLM_DEFAULT_EMBEDDING_DIMENSIONS:-}
      AKL_LLM_DEFAULT_MAX_TOKENS: ${AKL_LLM_DEFAULT_MAX_TOKENS:-512}
      AKL_OLLAMA_BASE_URL: ${AKL_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      AKL_OLLAMA_BASE_URLS: ${AKL_OLLAMA_BASE_URLS:-http://host.docker.internal:11434}
      AKL_OLLAMA_THINK: ${AKL_OLLAMA_THINK:-false}

  ingestion-service:
    environment:
      AKL_INGESTION_DEFAULT_EXTRACTION_PROFILE: ${AKL_INGESTION_DEFAULT_EXTRACTION_PROFILE:-document_text_v1}
      AKL_INGESTION_PDF_ENGINE: ${AKL_INGESTION_PDF_ENGINE:-auto}
      AKL_INGESTION_OCR_PROVIDER: ${AKL_INGESTION_OCR_PROVIDER:-ocrmypdf}
      AKL_INGESTION_OCR_LANGUAGE: ${AKL_INGESTION_OCR_LANGUAGE:-ces+eng}
      AKL_INGESTION_OCRMYPDF_COMMAND: ${AKL_INGESTION_OCRMYPDF_COMMAND:-ocrmypdf}
      AKL_INGESTION_OCR_TIMEOUT_SECONDS: ${AKL_INGESTION_OCR_TIMEOUT_SECONDS:-300}
      AKL_INGESTION_MIN_EXTRACTED_CHARS_BEFORE_OCR: ${AKL_INGESTION_MIN_EXTRACTED_CHARS_BEFORE_OCR:-20}
      AKL_INGESTION_EMBEDDING_CLIENT_MODE: ${AKL_INGESTION_EMBEDDING_CLIENT_MODE:-http}
      AKL_INGESTION_DEFAULT_EMBEDDING_MODEL: ${AKL_INGESTION_DEFAULT_EMBEDDING_MODEL:-bge-m3}
      AKL_INGESTION_DEFAULT_EMBEDDING_DIMENSIONS: ${AKL_INGESTION_DEFAULT_EMBEDDING_DIMENSIONS:-}
      AKL_INGESTION_EMBEDDING_PROFILE_MODEL_MAP: ${AKL_INGESTION_EMBEDDING_PROFILE_MODEL_MAP:-{}}
      AKL_INGESTION_EMBEDDING_PROFILE_DIMENSIONS_MAP: ${AKL_INGESTION_EMBEDDING_PROFILE_DIMENSIONS_MAP:-{}}
      AKL_INGESTION_INDEXER_MODE: ${AKL_INGESTION_INDEXER_MODE:-qdrant,opensearch}
      AKL_QDRANT_COLLECTION: ${AKL_QDRANT_COLLECTION:-akl_document_chunks}
      AKL_QDRANT_VECTOR_SIZE: ${AKL_QDRANT_VECTOR_SIZE:-1024}
      AKL_QDRANT_DISTANCE: ${AKL_QDRANT_DISTANCE:-Cosine}
      AKL_RAG_V2_INDEX_MODE: ${AKL_RAG_V2_INDEX_MODE:-off}
      AKL_QDRANT_V2_COLLECTION: ${AKL_QDRANT_V2_COLLECTION:-document_chunks_v2}
      AKL_RAG_COLBERT_INDEX_MODE: ${AKL_RAG_COLBERT_INDEX_MODE:-off}
      AKL_RAG_COLBERT_BASE_URL: ${AKL_RAG_COLBERT_BASE_URL:-}
      AKL_OPENSEARCH_INDEX: ${AKL_OPENSEARCH_INDEX:-akl_document_chunks}

  rag-retrieval-service:
    environment:
      AKL_RAG_DEPENDENCY_MODE: ${AKL_RAG_DEPENDENCY_MODE:-http}
      AKL_RAG_REGISTRY_CLIENT_MODE: ${AKL_RAG_REGISTRY_CLIENT_MODE:-http}
      AKL_RAG_RETRIEVER_MODE: ${AKL_RAG_RETRIEVER_MODE:-qdrant}
      AKL_RAG_FULLTEXT_MODE: ${AKL_RAG_FULLTEXT_MODE:-opensearch}
      AKL_RAG_LLM_CLIENT_MODE: ${AKL_RAG_LLM_CLIENT_MODE:-http}
      AKL_RAG_CHAT_MODEL: ${AKL_RAG_CHAT_MODEL:-gemma4:12b-mlx}
      AKL_RAG_HIGH_QUALITY_CHAT_MODEL: ${AKL_RAG_HIGH_QUALITY_CHAT_MODEL:-}
      AKL_RAG_HIGH_QUALITY_MIN_CONTEXT_CHUNKS: ${AKL_RAG_HIGH_QUALITY_MIN_CONTEXT_CHUNKS:-6}
      AKL_RAG_EMBEDDING_MODEL: ${AKL_RAG_EMBEDDING_MODEL:-bge-m3}
      AKL_RAG_EMBEDDING_DIMENSIONS: ${AKL_RAG_EMBEDDING_DIMENSIONS:-}
      AKL_RAG_ANSWER_MAX_TOKENS: ${AKL_RAG_ANSWER_MAX_TOKENS:-512}
      AKL_RAG_SOURCE_CONTEXT_WINDOW: ${AKL_RAG_SOURCE_CONTEXT_WINDOW:-1}
      AKL_RAG_AUTHZ_MODE: ${AKL_RAG_AUTHZ_MODE:-dev}
      AKL_RAG_REQUIRE_CITATIONS: ${AKL_RAG_REQUIRE_CITATIONS:-true}
      AKL_RAG_ENABLE_RERANKING: ${AKL_RAG_ENABLE_RERANKING:-true}
      AKL_RAG_V2_RETRIEVAL_MODE: ${AKL_RAG_V2_RETRIEVAL_MODE:-off}
      AKL_QDRANT_V2_COLLECTION: ${AKL_QDRANT_V2_COLLECTION:-document_chunks_v2}
      AKL_RAG_RERANKER_MODE: ${AKL_RAG_RERANKER_MODE:-off}
      AKL_RAG_RERANKER_PROVIDER: ${AKL_RAG_RERANKER_PROVIDER:-tei}
      AKL_RAG_RERANKER_BASE_URL: ${AKL_RAG_RERANKER_BASE_URL:-}
      AKL_RAG_RERANKER_MODEL: ${AKL_RAG_RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      AKL_RAG_RERANKER_STRATEGY: ${AKL_RAG_RERANKER_STRATEGY:-cross_encoder}
      AKL_RAG_ADAPTIVE_RETRIEVAL_MODE: ${AKL_RAG_ADAPTIVE_RETRIEVAL_MODE:-off}
      AKL_RAG_PARENT_RETRIEVAL_MODE: ${AKL_RAG_PARENT_RETRIEVAL_MODE:-off}
      AKL_RAG_EVIDENCE_GATE_MODE: ${AKL_RAG_EVIDENCE_GATE_MODE:-off}
      AKL_RAG_EVIDENCE_VERIFIER_MODEL: ${AKL_RAG_EVIDENCE_VERIFIER_MODEL:-}
      AKL_RAG_COLBERT_MODE: ${AKL_RAG_COLBERT_MODE:-off}
      AKL_RAG_COLBERT_BASE_URL: ${AKL_RAG_COLBERT_BASE_URL:-}
      AKL_QDRANT_COLLECTION: ${AKL_QDRANT_COLLECTION:-akl_document_chunks}
      AKL_OPENSEARCH_INDEX: ${AKL_OPENSEARCH_INDEX:-akl_document_chunks}

  web:
    environment:
      AKL_API_CLIENT_MODE: ${AKL_API_CLIENT_MODE:-production}
      AKL_AUTH_MODE: ${AKL_AUTH_MODE:-mock}
      AKL_WEB_DEV_SUBJECT: ${AKL_WEB_DEV_SUBJECT:-user_dev}
      AKL_WEB_DEV_ROLES: ${AKL_WEB_DEV_ROLES:-admin,document_manager,reader}
      AKL_WEB_DEV_CAPABILITIES: ${AKL_WEB_DEV_CAPABILITIES:-}
      AKL_WEB_DEV_SCOPES: ${AKL_WEB_DEV_SCOPES:-}
      AKL_WEB_DEV_ORGANIZATION_ID: ${AKL_WEB_DEV_ORGANIZATION_ID:-org_stratos}
