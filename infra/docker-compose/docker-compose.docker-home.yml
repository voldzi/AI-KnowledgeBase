name: ${COMPOSE_PROJECT_NAME:-akl}

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-python-healthcheck: &python-healthcheck
  interval: 20s
  timeout: 5s
  retries: 6
  start_period: 20s

services:
  reverse-proxy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    environment:
      AKL_PROXY_CONTAINER_PORT: ${AKL_PROXY_CONTAINER_PORT:-8080}
      PLATFORM_STATUS_UPSTREAM: ${PLATFORM_STATUS_UPSTREAM:-platform-status:8080}
      WEB_UPSTREAM: ${WEB_UPSTREAM:-web:3000}
      REGISTRY_UPSTREAM: ${REGISTRY_UPSTREAM:-registry-api:8000}
      INGESTION_UPSTREAM: ${INGESTION_UPSTREAM:-ingestion-service:8090}
      RAG_UPSTREAM: ${RAG_UPSTREAM:-rag-retrieval-service:8080}
      LLM_GATEWAY_UPSTREAM: ${LLM_GATEWAY_UPSTREAM:-llm-gateway-service:8080}
      EVALUATION_UPSTREAM: ${EVALUATION_UPSTREAM:-evaluation-service:8080}
      GOVERNANCE_UPSTREAM: ${GOVERNANCE_UPSTREAM:-governance-service:8080}
      GRAFANA_UPSTREAM: ${GRAFANA_UPSTREAM:-grafana:3000}
    ports:
      - "${AKL_PROXY_HTTP_PORT:-8080}:${AKL_PROXY_CONTAINER_PORT:-8080}"
    volumes:
      - ../reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      platform-status:
        condition: service_healthy
    networks:
      - public_zone
      - app_zone
      - management_zone
    logging: *json-logging

  platform-status:
    build:
      context: ../..
      dockerfile: services/platform-infrastructure/Dockerfile
    image: ${PLATFORM_STATUS_IMAGE:-akl/platform-status:docker-home}
    restart: unless-stopped
    environment:
      AKL_ENV: production
      AKL_AUTH_MODE: oidc
      AKL_SERVICE_NAME: platform-infrastructure
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      PLATFORM_HOST: 0.0.0.0
      PLATFORM_PORT: 8080
      PLATFORM_READY_TIMEOUT_SECONDS: ${PLATFORM_READY_TIMEOUT_SECONDS:-3}
      PLATFORM_READY_CHECKS: ${PLATFORM_READY_CHECKS:-registry=http://registry-api:8000/health,qdrant=http://qdrant:6333/readyz,web=http://web:3000/health}
    networks:
      - app_zone
      - management_zone
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()\""]
      <<: *python-healthcheck
    logging: *json-logging

  web:
    build:
      context: ../../apps/web
      secrets:
        - npmrc
    image: ${WEB_IMAGE:-akl/web:docker-home}
    restart: unless-stopped
    environment:
      AKL_ENV: production
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_API_CLIENT_MODE: production
      AKL_AUTH_MODE: ${AKL_WEB_AUTH_MODE:-oidc}
      AKL_REGISTRY_API_BASE_URL: http://registry-api:8000/api/v1
      AKL_INGESTION_API_BASE_URL: http://ingestion-service:8090/api/v1
      AKL_RAG_API_BASE_URL: http://rag-retrieval-service:8080/api/v1
      AKL_GOVERNANCE_API_BASE_URL: http://governance-service:8080/api/v1
      AKL_WEB_OIDC_ISSUER: ${AKL_WEB_OIDC_ISSUER:?AKL_WEB_OIDC_ISSUER must be set}
      AKL_WEB_OIDC_CLIENT_ID: ${AKL_WEB_OIDC_CLIENT_ID:-akl-web}
      AKL_WEB_OIDC_CLIENT_SECRET: ${AKL_WEB_OIDC_CLIENT_SECRET:-}
      AKL_WEB_OIDC_SCOPES: ${AKL_WEB_OIDC_SCOPES:-openid profile email}
      AKL_WEB_PUBLIC_BASE_URL: ${AKL_WEB_PUBLIC_BASE_URL:?AKL_WEB_PUBLIC_BASE_URL must be set}
      AKL_WEB_SESSION_SECRET: ${AKL_WEB_SESSION_SECRET:?AKL_WEB_SESSION_SECRET must be set}
      AKL_WEB_OBJECT_STORAGE_ROOT: /data/object-storage
      AKL_WEB_UPLOAD_BUCKET: ${AKL_WEB_UPLOAD_BUCKET:-akl-documents}
      AKL_WEB_UPLOAD_SIGNING_SECRET: ${AKL_WEB_UPLOAD_SIGNING_SECRET:?AKL_WEB_UPLOAD_SIGNING_SECRET must be set}
      AKL_WEB_UPLOAD_MAX_FILE_BYTES: ${AKL_WEB_UPLOAD_MAX_FILE_BYTES:-52428800}
      PORT: 3000
    volumes:
      - ${AKL_SEAWEEDFS_AKL_ROOT:-/srv/seaweedfs/akl}:/data/object-storage
    depends_on:
      registry-api:
        condition: service_healthy
      ingestion-service:
        condition: service_healthy
      rag-retrieval-service:
        condition: service_healthy
      governance-service:
        condition: service_started
    networks:
      - app_zone
    logging: *json-logging

  registry-api:
    build:
      context: ../../services/registry-api
    image: ${REGISTRY_API_IMAGE:-akl/registry-api:docker-home}
    restart: unless-stopped
    environment:
      AKL_ENV: production
      AKL_SERVICE_NAME: registry-api
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_REGISTRY_AUTH_MODE:-oidc}
      AKL_DATABASE_URL: ${AKL_REGISTRY_DATABASE_URL:?AKL_REGISTRY_DATABASE_URL must be set}
      AKL_AUTO_CREATE_SCHEMA: ${AKL_REGISTRY_AUTO_CREATE_SCHEMA:-false}
      AKL_OIDC_ISSUER: ${AKL_OIDC_ISSUER:?AKL_OIDC_ISSUER must be set}
      AKL_OIDC_AUDIENCE: ${AKL_OIDC_AUDIENCE:-akl-api}
      AKL_OIDC_JWKS_URL: ${AKL_OIDC_JWKS_URL:?AKL_OIDC_JWKS_URL must be set}
    networks:
      - app_zone
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      <<: *python-healthcheck
    logging: *json-logging

  ingestion-service:
    build:
      context: ../../services/ingestion-service
    image: ${INGESTION_SERVICE_IMAGE:-akl/ingestion-service:docker-home}
    restart: unless-stopped
    environment:
      AKL_ENV: production
      AKL_SERVICE_NAME: ingestion-service
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_INGESTION_AUTH_MODE:-oidc}
      AKL_SERVICE_ACCOUNT_SUBJECT: ${AKL_INGESTION_SERVICE_ACCOUNT_SUBJECT:-svc-ingestion}
      AKL_SERVICE_ACCOUNT_ROLES: ${AKL_INGESTION_SERVICE_ACCOUNT_ROLES:-service_ingestion,document_manager}
      AKL_INGESTION_REGISTRY_CLIENT_MODE: http
      AKL_REGISTRY_API_BASE_URL: http://registry-api:8000
      AKL_INGESTION_OBJECT_STORAGE_MODE: local
      AKL_OBJECT_STORAGE_ROOT: /data/object-storage
      AKL_INGESTION_EMBEDDING_CLIENT_MODE: ${AKL_INGESTION_EMBEDDING_CLIENT_MODE:-http}
      AKL_LLM_GATEWAY_BASE_URL: http://llm-gateway-service:8080/api/v1
      AKL_INGESTION_DEFAULT_EMBEDDING_MODEL: ${AKL_INGESTION_DEFAULT_EMBEDDING_MODEL:-bge-m3}
      AKL_INGESTION_INDEXER_MODE: qdrant
      AKL_QDRANT_BASE_URL: http://qdrant:6333
      AKL_QDRANT_COLLECTION: ${AKL_QDRANT_COLLECTION:-akl_document_chunks}
      AKL_QDRANT_VECTOR_SIZE: ${AKL_QDRANT_VECTOR_SIZE:-1024}
      AKL_QDRANT_DISTANCE: ${AKL_QDRANT_DISTANCE:-Cosine}
      AKL_INGESTION_JOB_STORE_PATH: /data/ingestion-jobs
      AKL_INGESTION_PROCESS_JOBS_INLINE: ${AKL_INGESTION_PROCESS_JOBS_INLINE:-true}
    volumes:
      - ${AKL_SEAWEEDFS_AKL_ROOT:-/srv/seaweedfs/akl}:/data/object-storage
      - ingestion-jobs:/data/ingestion-jobs
    depends_on:
      registry-api:
        condition: service_healthy
      qdrant:
        condition: service_started
      llm-gateway-service:
        condition: service_healthy
    networks:
      - app_zone
      - data_zone
    logging: *json-logging

  rag-retrieval-service:
    build:
      context: ../../services/rag-retrieval-service
    image: ${RAG_RETRIEVAL_SERVICE_IMAGE:-akl/rag-retrieval-service:docker-home}
    restart: unless-stopped
    environment:
      AKL_ENV: production
      AKL_SERVICE_NAME: rag-retrieval-service
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_RAG_AUTH_MODE:-oidc}
      AKL_SERVICE_ACCOUNT_SUBJECT: ${AKL_RAG_SERVICE_ACCOUNT_SUBJECT:-svc-rag}
      AKL_SERVICE_ACCOUNT_ROLES: ${AKL_RAG_SERVICE_ACCOUNT_ROLES:-service_rag}
      AKL_RAG_DEPENDENCY_MODE: http
      AKL_RAG_REGISTRY_CLIENT_MODE: http
      AKL_RAG_RETRIEVER_MODE: qdrant
      AKL_RAG_LLM_CLIENT_MODE: http
      AKL_RAG_AUTHZ_MODE: ${AKL_RAG_AUTHZ_MODE:-registry}
      AKL_REGISTRY_BASE_URL: http://registry-api:8000/api/v1
      AKL_QDRANT_BASE_URL: http://qdrant:6333
      AKL_QDRANT_COLLECTION: ${AKL_QDRANT_COLLECTION:-akl_document_chunks}
      AKL_LLM_GATEWAY_BASE_URL: http://llm-gateway-service:8080/api/v1
      AKL_RAG_CHAT_MODEL: ${AKL_RAG_CHAT_MODEL:-gemma4:12b}
      AKL_RAG_EMBEDDING_MODEL: ${AKL_RAG_EMBEDDING_MODEL:-bge-m3}
      AKL_RAG_ANSWER_MAX_TOKENS: ${AKL_RAG_ANSWER_MAX_TOKENS:-512}
      AKL_RAG_REQUIRE_CITATIONS: ${AKL_RAG_REQUIRE_CITATIONS:-true}
      AKL_RAG_ENABLE_RERANKING: ${AKL_RAG_ENABLE_RERANKING:-true}
    depends_on:
      registry-api:
        condition: service_healthy
      qdrant:
        condition: service_started
      llm-gateway-service:
        condition: service_healthy
    networks:
      - app_zone
      - data_zone
    logging: *json-logging

  llm-gateway-service:
    build:
      context: ../../services/llm-gateway-service
    image: ${LLM_GATEWAY_SERVICE_IMAGE:-akl/llm-gateway-service:docker-home}
    restart: unless-stopped
    environment:
      AKL_ENV: production
      AKL_SERVICE_NAME: llm-gateway-service
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_LLM_AUTH_MODE:-oidc}
      AKL_LLM_DEFAULT_PROVIDER: ${AKL_LLM_DEFAULT_PROVIDER:-ollama}
      AKL_LLM_ENABLED_PROVIDERS: ${AKL_LLM_ENABLED_PROVIDERS:-mock,ollama}
      AKL_LLM_MODEL_PROVIDER_MAP: ${AKL_LLM_MODEL_PROVIDER_MAP:-{"gemma4:12b":"ollama","bge-m3":"ollama","mock-chat":"mock","mock-embedding":"mock"}}
      AKL_LLM_DEFAULT_CHAT_MODEL: ${AKL_LLM_DEFAULT_CHAT_MODEL:-gemma4:12b}
      AKL_LLM_DEFAULT_EMBEDDING_MODEL: ${AKL_LLM_DEFAULT_EMBEDDING_MODEL:-bge-m3}
      AKL_LLM_DEFAULT_MAX_TOKENS: ${AKL_LLM_DEFAULT_MAX_TOKENS:-512}
      AKL_LLM_ALLOW_MODEL_PULL: ${AKL_LLM_ALLOW_MODEL_PULL:-false}
      AKL_LLM_ALLOW_MODEL_DELETE: ${AKL_LLM_ALLOW_MODEL_DELETE:-false}
      AKL_OLLAMA_BASE_URL: ${AKL_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      AKL_OLLAMA_THINK: ${AKL_OLLAMA_THINK:-false}
      AKL_OPENAI_COMPAT_BASE_URL: ${AKL_OPENAI_COMPAT_BASE_URL:-http://vllm:8000}
      AKL_OPENAI_COMPAT_API_KEY: ${AKL_OPENAI_COMPAT_API_KEY:-}
    networks:
      - app_zone
      - ai_compute_zone
    logging: *json-logging

  evaluation-service:
    build:
      context: ../../services/evaluation-service
    image: ${EVALUATION_SERVICE_IMAGE:-akl/evaluation-service:docker-home}
    restart: unless-stopped
    environment:
      AKL_ENV: production
      AKL_SERVICE_NAME: evaluation-service
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_EVAL_AUTH_MODE:-oidc}
      AKL_EVAL_DEPENDENCY_MODE: http
      AKL_EVAL_RAG_CLIENT_MODE: http
      AKL_EVAL_REGISTRY_CLIENT_MODE: http
      AKL_RAG_BASE_URL: http://rag-retrieval-service:8080/api/v1
      AKL_REGISTRY_BASE_URL: http://registry-api:8000/api/v1
      AKL_EVAL_REPORTS_DIR: /data/evaluation-reports
    volumes:
      - evaluation-reports:/data/evaluation-reports
    depends_on:
      registry-api:
        condition: service_healthy
      rag-retrieval-service:
        condition: service_healthy
    networks:
      - app_zone
    logging: *json-logging

  governance-service:
    build:
      context: ../../services/governance-service
    image: ${GOVERNANCE_SERVICE_IMAGE:-akl/governance-service:docker-home}
    restart: unless-stopped
    environment:
      AKL_ENV: production
      AKL_SERVICE_NAME: governance-service
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_GOVERNANCE_AUTH_MODE:-oidc}
      AKL_GOVERNANCE_DEPENDENCY_MODE: http
      AKL_GOVERNANCE_REGISTRY_CLIENT_MODE: http
      AKL_GOVERNANCE_RAG_CLIENT_MODE: http
      AKL_REGISTRY_BASE_URL: http://registry-api:8000/api/v1
      AKL_RAG_BASE_URL: http://rag-retrieval-service:8080/api/v1
    depends_on:
      registry-api:
        condition: service_healthy
      rag-retrieval-service:
        condition: service_healthy
    networks:
      - app_zone
    logging: *json-logging

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - data_zone
      - management_zone
    logging: *json-logging

networks:
  public_zone:
    driver: bridge
  app_zone:
    driver: bridge
  data_zone:
    driver: bridge
    internal: true
  ai_compute_zone:
    driver: bridge
    internal: true
  management_zone:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  qdrant-data:
  ingestion-jobs:
  evaluation-reports:

secrets:
  npmrc:
    file: ${AKL_NPMRC_SECRET_FILE:-/srv/akl/secrets/npmrc}
