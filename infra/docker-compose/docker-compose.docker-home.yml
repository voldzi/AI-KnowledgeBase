      - app_zone
      - data_zone
    logging: *json-logging

  rag-retrieval-service:
    build:
      context: ../../services/rag-retrieval-service
      labels: *immutable-release-labels
    image: ${RAG_RETRIEVAL_SERVICE_IMAGE:-akl/rag-retrieval-service:docker-home}
    restart: unless-stopped
    labels: *immutable-release-labels
    environment:
      AKL_ENV: production
      AKL_SERVICE_NAME: rag-retrieval-service
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_RAG_AUTH_MODE:-oidc}
      AKL_OIDC_ISSUER: ${AKL_OIDC_ISSUER:?AKL_OIDC_ISSUER must be set}
      AKL_OIDC_AUDIENCE: ${AKL_OIDC_AUDIENCE:-akl-api}
      AKL_OIDC_JWKS_URL: ${AKL_OIDC_JWKS_URL:?AKL_OIDC_JWKS_URL must be set}
      AKL_RAG_USER_OIDC_AUDIENCE: ${AKL_RAG_USER_OIDC_AUDIENCE:?AKL_RAG_USER_OIDC_AUDIENCE must be set}
      AKL_RAG_AIIP_OIDC_AUDIENCE: ${AKL_RAG_AIIP_OIDC_AUDIENCE:?AKL_RAG_AIIP_OIDC_AUDIENCE must be set}
      AKL_TRUSTED_SERVICE_CLIENT_IDS: ${AKL_RAG_TRUSTED_SERVICE_CLIENT_IDS:?AKL_RAG_TRUSTED_SERVICE_CLIENT_IDS must be set}
      AKL_RAG_AIIP_SERVICE_CLIENT_IDS: ${AKL_RAG_AIIP_SERVICE_CLIENT_IDS:?AKL_RAG_AIIP_SERVICE_CLIENT_IDS must be set}
      AKL_SERVICE_ACCOUNT_SUBJECT: ${AKL_RAG_SERVICE_ACCOUNT_SUBJECT:-svc-rag}
      AKL_SERVICE_ACCOUNT_ROLES: ${AKL_RAG_SERVICE_ACCOUNT_ROLES:-service_rag}
      AKL_RAG_DEPENDENCY_MODE: http
      AKL_RAG_REGISTRY_CLIENT_MODE: http
      AKL_RAG_RETRIEVER_MODE: qdrant
      AKL_RAG_FULLTEXT_MODE: ${AKL_RAG_FULLTEXT_MODE:-opensearch}
      AKL_RAG_LLM_CLIENT_MODE: http
      AKL_RAG_AUTHZ_MODE: ${AKL_RAG_AUTHZ_MODE:-registry}
      AKL_REGISTRY_BASE_URL: http://registry-api:8000/api/v1
      AKL_REGISTRY_SERVICE_TOKEN_URL: ${AKL_RAG_REGISTRY_TOKEN_URL:-https://login.zeleznalady.cz/realms/stratos/protocol/openid-connect/token}
      AKL_REGISTRY_SERVICE_CLIENT_ID: ${AKL_RAG_REGISTRY_CLIENT_ID:-akb-rag-service}
      AKL_REGISTRY_SERVICE_CLIENT_SECRET_FILE: /run/secrets/akb-rag-service-client-secret
      AKL_QDRANT_BASE_URL: http://qdrant:6333
      AKL_QDRANT_COLLECTION: ${AKL_QDRANT_COLLECTION:-akl_document_chunks}
      AKL_OPENSEARCH_BASE_URL: ${AKL_OPENSEARCH_BASE_URL:-http://opensearch:9200}
      AKL_OPENSEARCH_INDEX: ${AKL_OPENSEARCH_INDEX:-akl_document_chunks}
      AKL_LLM_GATEWAY_BASE_URL: http://llm-gateway-service:8080/api/v1
      AKL_LLM_GATEWAY_TOKEN: ${AKL_LLM_GATEWAY_SERVICE_TOKEN:?AKL_LLM_GATEWAY_SERVICE_TOKEN must be set}
      AKL_LLM_GATEWAY_AUDIENCE: ${AKL_LLM_GATEWAY_AUDIENCE:-llm-gateway-service}
      AKL_GOVERNANCE_BASE_URL: http://governance-service:8080/api/v1
      AKL_RAG_CHAT_MODEL: ${AKL_RAG_CHAT_MODEL:-gemma4:12b-mlx}
      AKL_RAG_HIGH_QUALITY_CHAT_MODEL: ${AKL_RAG_HIGH_QUALITY_CHAT_MODEL:-}
      AKL_RAG_HIGH_QUALITY_MIN_CONTEXT_CHUNKS: ${AKL_RAG_HIGH_QUALITY_MIN_CONTEXT_CHUNKS:-6}
      AKL_RAG_EMBEDDING_MODEL: ${AKL_RAG_EMBEDDING_MODEL:-bge-m3}
      AKL_RAG_EMBEDDING_DIMENSIONS: ${AKL_RAG_EMBEDDING_DIMENSIONS:-}
      AKL_RAG_ANSWER_MAX_TOKENS: ${AKL_RAG_ANSWER_MAX_TOKENS:-512}
      AKL_RAG_SOURCE_CONTEXT_WINDOW: ${AKL_RAG_SOURCE_CONTEXT_WINDOW:-1}
      AKL_RAG_REQUIRE_CITATIONS: ${AKL_RAG_REQUIRE_CITATIONS:-true}
      AKL_RAG_ENABLE_RERANKING: ${AKL_RAG_ENABLE_RERANKING:-true}
    volumes:
      - ${AKL_RAG_REGISTRY_CLIENT_SECRET_FILE:-/srv/akl/env/akb-rag-service.client-secret}:/run/secrets/akb-rag-service-client-secret:ro
    depends_on:
      registry-api:
        condition: service_healthy
      qdrant:
        condition: service_started
      opensearch:
        condition: service_started
      llm-gateway-service:
        condition: service_healthy
    networks:
      - app_zone
      - data_zone
    logging: *json-logging

  llm-gateway-service:
    build:
      context: ../../services/llm-gateway-service
    image: ${LLM_GATEWAY_SERVICE_IMAGE:-akl/llm-gateway-service:docker-home}
    restart: unless-stopped
    environment:
      AKL_ENV: production
      AKL_SERVICE_NAME: llm-gateway-service
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_LLM_AUTH_MODE:-bearer}
      AKL_SERVICE_TOKEN: ${AKL_LLM_GATEWAY_SERVICE_TOKEN:?AKL_LLM_GATEWAY_SERVICE_TOKEN must be set}
      AKL_LLM_REQUIRE_CALLER_IDENTITY: ${AKL_LLM_REQUIRE_CALLER_IDENTITY:-true}
      AKL_LLM_GATEWAY_AUDIENCE: ${AKL_LLM_GATEWAY_AUDIENCE:-llm-gateway-service}
      AKL_LLM_GATEWAY_ALLOWED_CALLER_ROLES: ${AKL_LLM_GATEWAY_ALLOWED_CALLER_ROLES:-service_ingestion,service_rag}
      AKL_LLM_DEFAULT_PROVIDER: ${AKL_LLM_DEFAULT_PROVIDER:-ollama}
      AKL_LLM_ENABLED_PROVIDERS: ${AKL_LLM_ENABLED_PROVIDERS:-ollama}
      AKL_LLM_MODEL_PROVIDER_MAP: ${AKL_LLM_MODEL_PROVIDER_MAP:-{"gemma4:12b-mlx":"ollama","gemma4:31b-mlx":"ollama","bge-m3":"ollama","qwen3-embedding:8b":"ollama","mock-chat":"mock","mock-embedding":"mock"}}
      AKL_LLM_DEFAULT_CHAT_MODEL: ${AKL_LLM_DEFAULT_CHAT_MODEL:-gemma4:12b-mlx}
      AKL_LLM_CHAT_MODEL_FALLBACKS: ${AKL_LLM_CHAT_MODEL_FALLBACKS:-{"gemma4:31b-mlx":["gemma4:12b-mlx"]}}
      AKL_LLM_DEFAULT_EMBEDDING_MODEL: ${AKL_LLM_DEFAULT_EMBEDDING_MODEL:-bge-m3}
      AKL_LLM_DEFAULT_EMBEDDING_DIMENSIONS: ${AKL_LLM_DEFAULT_EMBEDDING_DIMENSIONS:-}
      AKL_LLM_DEFAULT_MAX_TOKENS: ${AKL_LLM_DEFAULT_MAX_TOKENS:-512}
      AKL_LLM_ALLOW_MODEL_PULL: ${AKL_LLM_ALLOW_MODEL_PULL:-false}
      AKL_LLM_ALLOW_MODEL_DELETE: ${AKL_LLM_ALLOW_MODEL_DELETE:-false}
      AKL_OLLAMA_BASE_URL: ${AKL_OLLAMA_BASE_URL:-http://192.168.200.3:11434}
      AKL_OLLAMA_BASE_URLS: ${AKL_OLLAMA_BASE_URLS:-http://192.168.200.3:11434,http://192.168.200.2:11434,http://192.168.1.176:11434,http://host.docker.internal:11434}
      AKL_OLLAMA_ENDPOINT_TIMEOUT_SECONDS: ${AKL_OLLAMA_ENDPOINT_TIMEOUT_SECONDS:-3}
      AKL_OLLAMA_THINK: ${AKL_OLLAMA_THINK:-false}
      AKL_OPENAI_COMPAT_BASE_URL: ${AKL_OPENAI_COMPAT_BASE_URL:-http://vllm:8000}
      AKL_OPENAI_COMPAT_API_KEY: ${AKL_OPENAI_COMPAT_API_KEY:-}
    networks:
      - app_zone
      - ai_compute_zone
    logging: *json-logging

  evaluation-service:
    build:
      context: ../../services/evaluation-service
    image: ${EVALUATION_SERVICE_IMAGE:-akl/evaluation-service:docker-home}
    restart: unless-stopped
    environment:
      AKL_ENV: production
      AKL_SERVICE_NAME: evaluation-service
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_EVAL_AUTH_MODE:-oidc}
      AKL_SERVICE_TOKEN: ${AKL_EVAL_SERVICE_TOKEN:-}
      AKL_OIDC_ISSUER: ${AKL_OIDC_ISSUER:?AKL_OIDC_ISSUER must be set}
      AKL_OIDC_AUDIENCE: ${AKL_OIDC_AUDIENCE:-akl-api}
      AKL_OIDC_JWKS_URL: ${AKL_OIDC_JWKS_URL:?AKL_OIDC_JWKS_URL must be set}
      AKL_STRATOS_AUTH_ME_URL: ${AKL_STRATOS_AUTH_ME_URL:?AKL_STRATOS_AUTH_ME_URL must be set}
      AKL_STRATOS_ACCESS_TIMEOUT_SECONDS: ${AKL_STRATOS_ACCESS_TIMEOUT_SECONDS:-3}
      AKL_EVAL_DEPENDENCY_MODE: http
      AKL_EVAL_RAG_CLIENT_MODE: http
      AKL_EVAL_REGISTRY_CLIENT_MODE: http
      AKL_RAG_BASE_URL: http://rag-retrieval-service:8080/api/v1
      AKL_REGISTRY_BASE_URL: http://registry-api:8000/api/v1
      AKL_EVAL_DATASETS_DIR: /data/evaluation-datasets
      AKL_EVAL_SEED_DATASETS_DIR: /app/datasets
      AKL_EVAL_REPORTS_DIR: /data/evaluation-reports
      AKL_EVAL_CONCURRENCY: ${AKL_EVAL_CONCURRENCY:-4}
      AKL_EVAL_GATE_RETRIEVAL_RECALL_MIN: ${AKL_EVAL_GATE_RETRIEVAL_RECALL_MIN:-0.95}
      AKL_EVAL_GATE_RETRIEVAL_NDCG_MIN: ${AKL_EVAL_GATE_RETRIEVAL_NDCG_MIN:-0.85}
      AKL_EVAL_GATE_FALSE_ZERO_RESULT_RATE_MAX: ${AKL_EVAL_GATE_FALSE_ZERO_RESULT_RATE_MAX:-0.02}
      AKL_EVAL_GATE_AUTHORIZATION_LEAK_RATE_MAX: ${AKL_EVAL_GATE_AUTHORIZATION_LEAK_RATE_MAX:-0}
      AKL_EVAL_GATE_CITATION_TRACEABILITY_MIN: ${AKL_EVAL_GATE_CITATION_TRACEABILITY_MIN:-1}
      AKL_EVAL_GATE_RETRIEVAL_LATENCY_P95_MS_MAX: ${AKL_EVAL_GATE_RETRIEVAL_LATENCY_P95_MS_MAX:-3000}
    volumes:
      - evaluation-datasets:/data/evaluation-datasets
      - evaluation-reports:/data/evaluation-reports
    depends_on:
      registry-api:
        condition: service_healthy
      rag-retrieval-service:
        condition: service_healthy
    networks:
      - app_zone
    logging: *json-logging

  governance-service:
    build:
      context: ../../services/governance-service
    image: ${GOVERNANCE_SERVICE_IMAGE:-akl/governance-service:docker-home}
    restart: unless-stopped
    environment:
      AKL_ENV: production
      AKL_SERVICE_NAME: governance-service
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_GOVERNANCE_AUTH_MODE:-bearer}
      AKL_SERVICE_TOKEN: ${AKL_GOVERNANCE_SERVICE_TOKEN:?AKL_GOVERNANCE_SERVICE_TOKEN must be set}
      AKL_GOVERNANCE_DEPENDENCY_MODE: http
      AKL_GOVERNANCE_REGISTRY_CLIENT_MODE: http
      AKL_GOVERNANCE_RAG_CLIENT_MODE: http
      AKL_REGISTRY_BASE_URL: http://registry-api:8000/api/v1
      AKL_RAG_BASE_URL: http://rag-retrieval-service:8080/api/v1
    depends_on:
      registry-api:
        condition: service_healthy
      rag-retrieval-service:
        condition: service_healthy
    networks:
      - app_zone
    logging: *json-logging

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - data_zone
      - management_zone
    logging: *json-logging

  opensearch:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2}
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "${OPENSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - data_zone
      - management_zone
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/9200' >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 40s
    logging: *json-logging

networks:
  public_zone:
    driver: bridge
    ipam:
      config:
        - subnet: ${AKL_PUBLIC_ZONE_SUBNET:-10.246.240.0/24}
  app_zone:
    driver: bridge
    ipam:
      config:
        - subnet: ${AKL_APP_ZONE_SUBNET:-10.246.241.0/24}
  data_zone:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: ${AKL_DATA_ZONE_SUBNET:-10.246.242.0/24}
  ai_compute_zone:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: ${AKL_AI_COMPUTE_ZONE_SUBNET:-10.246.243.0/24}
  management_zone:
    driver: bridge
    ipam:
      config:
        - subnet: ${AKL_MANAGEMENT_ZONE_SUBNET:-10.246.244.0/24}

volumes:
  caddy-data:
  caddy-config:
  qdrant-data:
  opensearch-data:
  ingestion-jobs:
  evaluation-reports:
  evaluation-datasets:
