name: ${COMPOSE_PROJECT_NAME:-akl}

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-python-healthcheck: &python-healthcheck
  interval: 20s
  timeout: 5s
  retries: 6
  start_period: 20s

x-immutable-release-labels: &immutable-release-labels
  org.opencontainers.image.revision: ${AKL_SERVICE_VERSION:-0.1.0}
  cz.zeleznalady.akl.compose-project: ${AKL_RELEASE_COMPOSE_PROJECT:-akl}

services:
  reverse-proxy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    environment:
      AKL_PROXY_CONTAINER_PORT: ${AKL_PROXY_CONTAINER_PORT:-8080}
      PLATFORM_STATUS_UPSTREAM: ${PLATFORM_STATUS_UPSTREAM:-platform-status:8080}
      WEB_UPSTREAM: ${WEB_UPSTREAM:-web:3000}
      REGISTRY_UPSTREAM: ${REGISTRY_UPSTREAM:-registry-api:8000}
      INGESTION_UPSTREAM: ${INGESTION_UPSTREAM:-ingestion-service:8090}
      RAG_UPSTREAM: ${RAG_UPSTREAM:-rag-retrieval-service:8080}
      LLM_GATEWAY_UPSTREAM: ${LLM_GATEWAY_UPSTREAM:-llm-gateway-service:8080}
      EVALUATION_UPSTREAM: ${EVALUATION_UPSTREAM:-evaluation-service:8080}
      GOVERNANCE_UPSTREAM: ${GOVERNANCE_UPSTREAM:-governance-service:8080}
      GRAFANA_UPSTREAM: ${GRAFANA_UPSTREAM:-grafana:3000}
    ports:
      - "${AKL_PROXY_HTTP_PORT:-8080}:${AKL_PROXY_CONTAINER_PORT:-8080}"
    volumes:
      - ../reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      platform-status:
        condition: service_healthy
    networks:
      - public_zone
      - app_zone
      - management_zone
    logging: *json-logging

  platform-status:
    build:
      context: ../..
      dockerfile: services/platform-infrastructure/Dockerfile
    image: ${PLATFORM_STATUS_IMAGE:-akl/platform-status:docker-home}
    restart: unless-stopped
    environment:
      AKL_ENV: production
      AKL_AUTH_MODE: oidc
      AKL_SERVICE_NAME: platform-infrastructure
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      PLATFORM_HOST: 0.0.0.0
      PLATFORM_PORT: 8080
      PLATFORM_READY_TIMEOUT_SECONDS: ${PLATFORM_READY_TIMEOUT_SECONDS:-3}
      PLATFORM_READY_CHECKS: ${PLATFORM_READY_CHECKS:-registry=http://registry-api:8000/health,qdrant=http://qdrant:6333/readyz,opensearch=http://opensearch:9200,web=http://web:3000${AKL_WEB_BASE_PATH:-/akb}/health}
    networks:
      - app_zone
      - management_zone
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()\""]
      <<: *python-healthcheck
    logging: *json-logging

  web:
    build:
      context: ../../apps/web
      labels: *immutable-release-labels
      args:
        NEXT_PUBLIC_AKL_BASE_PATH: ${AKL_WEB_BASE_PATH:-/akb}
        AKL_IMAGE_SERVICE: web
    image: ${WEB_IMAGE:-akl/web:docker-home}
    restart: unless-stopped
    labels: *immutable-release-labels
    environment:
      AKL_ENV: production
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_API_CLIENT_MODE: production
      STRATOS_CONTENT_SECURITY_MODE: ${STRATOS_CONTENT_SECURITY_MODE:-disabled}
      STRATOS_CONTENT_SECURITY_REQUIRED: ${STRATOS_CONTENT_SECURITY_REQUIRED:-false}
      STRATOS_CONTENT_SECURITY_ENDPOINT: ${STRATOS_CONTENT_SECURITY_ENDPOINT:-}
      AKL_AUTH_MODE: ${AKL_WEB_AUTH_MODE:-oidc}
      AKL_REGISTRY_API_BASE_URL: http://registry-api:8000/api/v1
      AKL_INGESTION_API_BASE_URL: http://ingestion-service:8090/api/v1
      AKL_RAG_API_BASE_URL: http://rag-retrieval-service:8080/api/v1
      AKL_GOVERNANCE_API_BASE_URL: http://governance-service:8080/api/v1
      AKL_EVALUATION_API_BASE_URL: http://evaluation-service:8080/api/v1
      AKL_WEB_OIDC_ISSUER: ${AKL_WEB_OIDC_ISSUER:?AKL_WEB_OIDC_ISSUER must be set}
      AKL_WEB_OIDC_CLIENT_ID: ${AKL_WEB_OIDC_CLIENT_ID:-akl-web}
      AKL_WEB_OIDC_CLIENT_SECRET: ${AKL_WEB_OIDC_CLIENT_SECRET:-}
      AKL_WEB_OIDC_SCOPES: ${AKL_WEB_OIDC_SCOPES:-openid profile email}
      AKL_WEB_STRATOS_AUTH_ME_URL: ${AKL_WEB_STRATOS_AUTH_ME_URL:?AKL_WEB_STRATOS_AUTH_ME_URL must be set}
      AKL_WEB_STRATOS_ACCESS_TIMEOUT_MS: ${AKL_WEB_STRATOS_ACCESS_TIMEOUT_MS:-3000}
      AKL_WEB_STRATOS_ACCESS_CACHE_TTL_MS: ${AKL_WEB_STRATOS_ACCESS_CACHE_TTL_MS:-0}
      AKL_WEB_PUBLIC_BASE_URL: ${AKL_WEB_PUBLIC_BASE_URL:?AKL_WEB_PUBLIC_BASE_URL must be set}
      NEXT_PUBLIC_AKL_BASE_PATH: ${AKL_WEB_BASE_PATH:-/akb}
      AKL_WEB_SESSION_SECRET: ${AKL_WEB_SESSION_SECRET:?AKL_WEB_SESSION_SECRET must be set}
      AKL_WEB_INGESTION_TOKEN_URL: ${AKL_WEB_INGESTION_TOKEN_URL:?AKL_WEB_INGESTION_TOKEN_URL must be set}
      AKL_WEB_INGESTION_CLIENT_ID: ${AKL_WEB_INGESTION_CLIENT_ID:-svc-akb-web-ingestion}
      AKL_WEB_INGESTION_CLIENT_SECRET_SOURCE_FILE: /run/secrets/svc-akb-web-ingestion-client-secret
      AKL_WEB_INGESTION_CLIENT_SECRET_FILE: /run/akl-secrets/svc-akb-web-ingestion-client-secret
      AKL_WEB_OBJECT_STORAGE_ROOT: /data/object-storage
      AKL_WEB_UPLOAD_BUCKET: ${AKL_WEB_UPLOAD_BUCKET:-akl-documents}
      AKL_WEB_UPLOAD_SIGNING_SECRET: ${AKL_WEB_UPLOAD_SIGNING_SECRET:?AKL_WEB_UPLOAD_SIGNING_SECRET must be set}
      AKL_WEB_UPLOAD_MAX_FILE_BYTES: ${AKL_WEB_UPLOAD_MAX_FILE_BYTES:-52428800}
      AKL_PUBLIC_DELIVERY_INTERNAL_TOKEN: ${AKL_PUBLIC_DELIVERY_INTERNAL_TOKEN:?AKL_PUBLIC_DELIVERY_INTERNAL_TOKEN must be set}
      AKL_PUBLIC_RATE_WINDOW_MS: ${AKL_PUBLIC_RATE_WINDOW_MS:-60000}
      AKL_PUBLIC_RATE_PER_CLIENT_SLUG: ${AKL_PUBLIC_RATE_PER_CLIENT_SLUG:-30}
      AKL_PUBLIC_RATE_GLOBAL: ${AKL_PUBLIC_RATE_GLOBAL:-600}
      AKL_PUBLIC_CONCURRENCY_PER_CLIENT: ${AKL_PUBLIC_CONCURRENCY_PER_CLIENT:-2}
      AKL_PUBLIC_CONCURRENCY_GLOBAL: ${AKL_PUBLIC_CONCURRENCY_GLOBAL:-24}
      AKL_PUBLIC_LIMITER_MAX_KEYS: ${AKL_PUBLIC_LIMITER_MAX_KEYS:-10000}
      AKL_PUBLIC_TRUSTED_PROXY_HOPS: ${AKL_PUBLIC_TRUSTED_PROXY_HOPS:-0}
      AKL_PUBLIC_CLIENT_KEY_SECRET: ${AKL_PUBLIC_CLIENT_KEY_SECRET:-}
      PORT: 3000
    volumes:
      - ${AKL_SEAWEEDFS_AKL_ROOT:-/srv/seaweedfs/akl}:/data/object-storage
      - ${AKL_WEB_INGESTION_CLIENT_SECRET_FILE:-/srv/akl/env/svc-akb-web-ingestion.client-secret}:/run/secrets/svc-akb-web-ingestion-client-secret:ro
    tmpfs:
      - /run/akl-secrets:mode=0700,uid=0,gid=0
    depends_on:
      registry-api:
        condition: service_healthy
      ingestion-service:
        condition: service_healthy
      rag-retrieval-service:
        condition: service_healthy
      governance-service:
        condition: service_started
      evaluation-service:
        condition: service_healthy
    networks:
      - app_zone
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://$${HOSTNAME}:3000${AKL_WEB_BASE_PATH:-/akb}/health >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *json-logging

  chat-web:
    build:
      context: ../../apps/web
      labels: *immutable-release-labels
      args:
        NEXT_PUBLIC_AKL_BASE_PATH: ""
        AKL_IMAGE_SERVICE: chat-web
    image: ${CHAT_WEB_IMAGE:-akl/chat-web:docker-home}
    restart: unless-stopped
    labels: *immutable-release-labels
    environment:
      AKL_ENV: production
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_API_CLIENT_MODE: production
      AKL_WEB_PROFILE: chat
      AKL_AUTH_MODE: oidc
      AKL_REGISTRY_API_BASE_URL: http://registry-api:8000/api/v1
      AKL_INGESTION_API_BASE_URL: http://ingestion-service:8090/api/v1
      AKL_RAG_API_BASE_URL: http://rag-retrieval-service:8080/api/v1
      AKL_GOVERNANCE_API_BASE_URL: http://governance-service:8080/api/v1
      AKL_EVALUATION_API_BASE_URL: http://evaluation-service:8080/api/v1
      AKL_WEB_OIDC_ISSUER: ${AKL_CHAT_WEB_OIDC_ISSUER:?AKL_CHAT_WEB_OIDC_ISSUER must be set}
      AKL_WEB_OIDC_CLIENT_ID: ${AKL_CHAT_WEB_OIDC_CLIENT_ID:-akb-chat-web}
      AKL_WEB_OIDC_CLIENT_SECRET: ${AKL_CHAT_WEB_OIDC_CLIENT_SECRET:-}
      AKL_WEB_OIDC_SCOPES: ${AKL_CHAT_WEB_OIDC_SCOPES:-openid profile email}
      AKL_WEB_STRATOS_AUTH_ME_URL: ${AKL_CHAT_WEB_STRATOS_AUTH_ME_URL:?AKL_CHAT_WEB_STRATOS_AUTH_ME_URL must be set}
      AKL_WEB_STRATOS_ACCESS_TIMEOUT_MS: ${AKL_CHAT_WEB_STRATOS_ACCESS_TIMEOUT_MS:-3000}
      AKL_WEB_STRATOS_ACCESS_CACHE_TTL_MS: ${AKL_CHAT_WEB_STRATOS_ACCESS_CACHE_TTL_MS:-0}
      AKL_WEB_PUBLIC_BASE_URL: ${AKL_CHAT_WEB_PUBLIC_BASE_URL:?AKL_CHAT_WEB_PUBLIC_BASE_URL must be set}
      NEXT_PUBLIC_AKL_BASE_PATH: ""
      AKL_WEB_SESSION_SECRET: ${AKL_CHAT_WEB_SESSION_SECRET:?AKL_CHAT_WEB_SESSION_SECRET must be set}
      AKL_WEB_OBJECT_STORAGE_ROOT: /data/object-storage
      AKL_WEB_UPLOAD_BUCKET: ${AKL_WEB_UPLOAD_BUCKET:-akl-documents}
      AKL_WEB_UPLOAD_SIGNING_SECRET: ${AKL_WEB_UPLOAD_SIGNING_SECRET:?AKL_WEB_UPLOAD_SIGNING_SECRET must be set}
      PORT: 3000
    ports:
      - "${AKL_CHAT_WEB_HTTP_PORT:-3221}:3000"
    volumes:
      - ${AKL_SEAWEEDFS_AKL_ROOT:-/srv/seaweedfs/akl}:/data/object-storage:ro
    depends_on:
      registry-api:
        condition: service_healthy
      rag-retrieval-service:
        condition: service_healthy
      governance-service:
        condition: service_started
    networks:
      - app_zone
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://$${HOSTNAME}:3000/api/health >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *json-logging

  registry-api:
    build:
      context: ../../services/registry-api
      labels: *immutable-release-labels
    image: ${REGISTRY_API_IMAGE:-akl/registry-api:docker-home}
    restart: unless-stopped
    labels: *immutable-release-labels
    environment:
      AKL_ENV: production
      AKL_SERVICE_NAME: registry-api
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_REGISTRY_AUTH_MODE:-oidc}
      AKL_DATABASE_URL: ${AKL_REGISTRY_DATABASE_URL:?AKL_REGISTRY_DATABASE_URL must be set}
      AKL_AUTO_CREATE_SCHEMA: ${AKL_REGISTRY_AUTO_CREATE_SCHEMA:-false}
      AKL_OIDC_ISSUER: ${AKL_OIDC_ISSUER:?AKL_OIDC_ISSUER must be set}
      AKL_OIDC_AUDIENCE: ${AKL_OIDC_AUDIENCE:-akl-api}
      AKL_OIDC_JWKS_URL: ${AKL_OIDC_JWKS_URL:?AKL_OIDC_JWKS_URL must be set}
      AKL_TRUSTED_SERVICE_CLIENT_IDS: ${AKL_REGISTRY_TRUSTED_SERVICE_CLIENT_IDS:?AKL_REGISTRY_TRUSTED_SERVICE_CLIENT_IDS must be set}
      AKL_SERVICE_CLIENT_ROUTE_GRANTS: ${AKL_REGISTRY_SERVICE_CLIENT_ROUTE_GRANTS:?AKL_REGISTRY_SERVICE_CLIENT_ROUTE_GRANTS must be set}
      AKL_SERVICE_CLIENT_DELEGATIONS: ${AKL_REGISTRY_SERVICE_CLIENT_DELEGATIONS:-}
      AKL_STRATOS_AUTH_ME_URL: ${AKL_STRATOS_AUTH_ME_URL:?AKL_STRATOS_AUTH_ME_URL must be set}
      AKL_STRATOS_POLICY_BINDINGS_URL: ${AKL_STRATOS_POLICY_BINDINGS_URL:?AKL_STRATOS_POLICY_BINDINGS_URL must be set}
      AKL_STRATOS_POLICY_DECISIONS_URL: ${AKL_STRATOS_POLICY_DECISIONS_URL:?AKL_STRATOS_POLICY_DECISIONS_URL must be set}
      AKL_STRATOS_SERVICE_POLICY_BINDING_ID: ${AKL_STRATOS_SERVICE_POLICY_BINDING_ID:?AKL_STRATOS_SERVICE_POLICY_BINDING_ID must be set}
      AKL_STRATOS_INFORMATION_RESOURCES_URL: ${AKL_STRATOS_INFORMATION_RESOURCES_URL:?AKL_STRATOS_INFORMATION_RESOURCES_URL must be set}
      AKL_STRATOS_AIIP_AKB_RESOURCES_URL: ${AKL_STRATOS_AIIP_AKB_RESOURCES_URL:?AKL_STRATOS_AIIP_AKB_RESOURCES_URL must be set}
      AKL_STRATOS_INFORMATION_PUBLICATIONS_URL: ${AKL_STRATOS_INFORMATION_PUBLICATIONS_URL:?AKL_STRATOS_INFORMATION_PUBLICATIONS_URL must be set}
      AKL_STRATOS_PUBLIC_DECISIONS_URL: ${AKL_STRATOS_PUBLIC_DECISIONS_URL:?AKL_STRATOS_PUBLIC_DECISIONS_URL must be set}
      AKB_POLICY_SERVICE_TOKEN: ${AKB_POLICY_SERVICE_TOKEN:?AKB_POLICY_SERVICE_TOKEN must be set}
      AKB_AIIP_INGEST_SERVICE_TOKEN: ${AKB_AIIP_INGEST_SERVICE_TOKEN:?AKB_AIIP_INGEST_SERVICE_TOKEN must be set}
      AKL_PUBLIC_DELIVERY_INTERNAL_TOKEN: ${AKL_PUBLIC_DELIVERY_INTERNAL_TOKEN:?AKL_PUBLIC_DELIVERY_INTERNAL_TOKEN must be set}
      AKL_PUBLIC_AUDIT_WINDOW_SECONDS: ${AKL_PUBLIC_AUDIT_WINDOW_SECONDS:-60}
      AKL_PUBLIC_AUDIT_RETENTION_DAYS: ${AKL_PUBLIC_AUDIT_RETENTION_DAYS:-90}
      AKL_PUBLIC_AUDIT_PRUNE_INTERVAL_SECONDS: ${AKL_PUBLIC_AUDIT_PRUNE_INTERVAL_SECONDS:-3600}
      AKL_REGISTRY_PUBLIC_RATE_WINDOW_MS: ${AKL_REGISTRY_PUBLIC_RATE_WINDOW_MS:-60000}
      AKL_REGISTRY_PUBLIC_RATE_PER_CLIENT_SLUG: ${AKL_REGISTRY_PUBLIC_RATE_PER_CLIENT_SLUG:-600}
      AKL_REGISTRY_PUBLIC_RATE_GLOBAL: ${AKL_REGISTRY_PUBLIC_RATE_GLOBAL:-1200}
      AKL_REGISTRY_PUBLIC_CONCURRENCY_PER_CLIENT: ${AKL_REGISTRY_PUBLIC_CONCURRENCY_PER_CLIENT:-32}
      AKL_REGISTRY_PUBLIC_CONCURRENCY_GLOBAL: ${AKL_REGISTRY_PUBLIC_CONCURRENCY_GLOBAL:-64}
      AKL_REGISTRY_PUBLIC_LIMITER_MAX_KEYS: ${AKL_REGISTRY_PUBLIC_LIMITER_MAX_KEYS:-10000}
      AKL_REGISTRY_PUBLIC_TRUSTED_PROXY_HOPS: ${AKL_REGISTRY_PUBLIC_TRUSTED_PROXY_HOPS:-0}
      AKL_PUBLIC_CLIENT_KEY_SECRET: ${AKL_PUBLIC_CLIENT_KEY_SECRET:-}
      AKL_STRATOS_ACCESS_TIMEOUT_SECONDS: ${AKL_STRATOS_ACCESS_TIMEOUT_SECONDS:-3}
      AKL_STRATOS_ACCESS_CACHE_TTL_SECONDS: ${AKL_STRATOS_ACCESS_CACHE_TTL_SECONDS:-0}
      AKL_INGESTION_AUTHORIZATION_SECRET_FILE: /run/secrets/akl-ingestion-authorization-secret
      AKL_INGESTION_AUTHORIZATION_TTL_SECONDS: ${AKL_INGESTION_AUTHORIZATION_TTL_SECONDS:-60}
      AKL_KEYCLOAK_ADMIN_BASE_URL: ${AKL_KEYCLOAK_ADMIN_BASE_URL:-}
      AKL_KEYCLOAK_REALM: ${AKL_KEYCLOAK_REALM:-stratos}
      STRATOS_KEYCLOAK_DIRECTORY_CLIENT_ID: ${STRATOS_KEYCLOAK_DIRECTORY_CLIENT_ID:-}
      STRATOS_KEYCLOAK_DIRECTORY_CLIENT_SECRET: ${STRATOS_KEYCLOAK_DIRECTORY_CLIENT_SECRET:-}
    volumes:
      - ${AKL_INGESTION_AUTHORIZATION_SECRET_FILE:-/srv/akl/env/ingestion-authorization.secret}:/run/secrets/akl-ingestion-authorization-secret:ro
    networks:
      - app_zone
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      <<: *python-healthcheck
    logging: *json-logging

  ingestion-service:
    build:
      context: ../../services/ingestion-service
      labels:
        <<: *immutable-release-labels
        cz.zeleznalady.akl.service: ingestion-service
    image: ${INGESTION_SERVICE_IMAGE:-akl/ingestion-service:docker-home}
    restart: unless-stopped
    labels:
      <<: *immutable-release-labels
      cz.zeleznalady.akl.service: ingestion-service
    environment:
      AKL_ENV: production
      AKL_SERVICE_NAME: ingestion-service
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-0.1.0}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      STRATOS_CONTENT_SECURITY_MODE: ${STRATOS_CONTENT_SECURITY_MODE:-disabled}
      STRATOS_CONTENT_SECURITY_REQUIRED: ${STRATOS_CONTENT_SECURITY_REQUIRED:-false}
      STRATOS_CONTENT_SECURITY_ENDPOINT: ${STRATOS_CONTENT_SECURITY_ENDPOINT:-}
      AKL_AUTH_MODE: ${AKL_INGESTION_AUTH_MODE:-oidc}
      AKL_OIDC_ISSUER: ${AKL_OIDC_ISSUER:?AKL_OIDC_ISSUER must be set}
      AKL_OIDC_AUDIENCE: ${AKL_OIDC_AUDIENCE:-akl-api}
      AKL_OIDC_JWKS_URL: ${AKL_OIDC_JWKS_URL:?AKL_OIDC_JWKS_URL must be set}
      AKL_SERVICE_ACCOUNT_SUBJECT: ${AKL_INGESTION_SERVICE_ACCOUNT_SUBJECT:-svc-ingestion}
      AKL_SERVICE_ACCOUNT_ROLES: ${AKL_INGESTION_SERVICE_ACCOUNT_ROLES:-service_ingestion,document_manager}
      AKL_INGESTION_WEB_CLIENT_ID: ${AKL_INGESTION_WEB_CLIENT_ID:-svc-akb-web-ingestion}
      AKL_INGESTION_WEB_ROLE: ${AKL_INGESTION_WEB_ROLE:-service_akb_web_ingestion}
      AKL_INGESTION_REGISTRY_CLIENT_MODE: http
      AKL_REGISTRY_API_BASE_URL: http://registry-api:8000
      AKL_REGISTRY_SERVICE_TOKEN_URL: ${AKL_INGESTION_REGISTRY_TOKEN_URL:?AKL_INGESTION_REGISTRY_TOKEN_URL must be set}
      AKL_REGISTRY_SERVICE_CLIENT_ID: ${AKL_INGESTION_REGISTRY_CLIENT_ID:-svc-ingestion}
      AKL_REGISTRY_SERVICE_CLIENT_SECRET_FILE: /run/secrets/svc-ingestion-client-secret
      AKL_INGESTION_OBJECT_STORAGE_MODE: local
      AKL_OBJECT_STORAGE_ROOT: /data/object-storage
      AKL_INGESTION_DEFAULT_EXTRACTION_PROFILE: ${AKL_INGESTION_DEFAULT_EXTRACTION_PROFILE:-document_text_v1}
      AKL_INGESTION_PDF_ENGINE: ${AKL_INGESTION_PDF_ENGINE:-auto}
      AKL_INGESTION_OCR_PROVIDER: ${AKL_INGESTION_OCR_PROVIDER:-ocrmypdf}
      AKL_INGESTION_OCR_LANGUAGE: ${AKL_INGESTION_OCR_LANGUAGE:-ces+eng}
      AKL_INGESTION_OCRMYPDF_COMMAND: ${AKL_INGESTION_OCRMYPDF_COMMAND:-ocrmypdf}
      AKL_INGESTION_OCR_TIMEOUT_SECONDS: ${AKL_INGESTION_OCR_TIMEOUT_SECONDS:-300}
      AKL_INGESTION_MIN_EXTRACTED_CHARS_BEFORE_OCR: ${AKL_INGESTION_MIN_EXTRACTED_CHARS_BEFORE_OCR:-20}
      AKL_INGESTION_EMBEDDING_CLIENT_MODE: ${AKL_INGESTION_EMBEDDING_CLIENT_MODE:-http}
      AKL_LLM_GATEWAY_BASE_URL: http://llm-gateway-service:8080/api/v1
      AKL_LLM_GATEWAY_TOKEN: ${AKL_LLM_GATEWAY_SERVICE_TOKEN:?AKL_LLM_GATEWAY_SERVICE_TOKEN must be set}
      AKL_LLM_GATEWAY_AUDIENCE: ${AKL_LLM_GATEWAY_AUDIENCE:-llm-gateway-service}
      AKL_INGESTION_DEFAULT_EMBEDDING_MODEL: ${AKL_INGESTION_DEFAULT_EMBEDDING_MODEL:-bge-m3}
      AKL_INGESTION_DEFAULT_EMBEDDING_DIMENSIONS: ${AKL_INGESTION_DEFAULT_EMBEDDING_DIMENSIONS:-}
      AKL_INGESTION_EMBEDDING_PROFILE_MODEL_MAP: ${AKL_INGESTION_EMBEDDING_PROFILE_MODEL_MAP:-{}}
      AKL_INGESTION_EMBEDDING_PROFILE_DIMENSIONS_MAP: ${AKL_INGESTION_EMBEDDING_PROFILE_DIMENSIONS_MAP:-{}}
      AKL_INGESTION_EMBEDDING_BATCH_SIZE: ${AKL_INGESTION_EMBEDDING_BATCH_SIZE:-32}
      AKL_INGESTION_EMBEDDING_CONCURRENCY: ${AKL_INGESTION_EMBEDDING_CONCURRENCY:-1}
      AKL_INGESTION_INDEXER_MODE: ${AKL_INGESTION_INDEXER_MODE:-qdrant,opensearch}
      AKL_QDRANT_BASE_URL: http://qdrant:6333
      AKL_QDRANT_COLLECTION: ${AKL_QDRANT_COLLECTION:-akl_document_chunks}
      AKL_QDRANT_VECTOR_SIZE: ${AKL_QDRANT_VECTOR_SIZE:-1024}
      AKL_QDRANT_DISTANCE: ${AKL_QDRANT_DISTANCE:-Cosine}
      AKL_OPENSEARCH_BASE_URL: ${AKL_OPENSEARCH_BASE_URL:-http://opensearch:9200}
      AKL_OPENSEARCH_INDEX: ${AKL_OPENSEARCH_INDEX:-akl_document_chunks}
      AKL_INGESTION_JOB_STORE_PATH: /data/ingestion-jobs
      AKL_INGESTION_PROCESS_JOBS_INLINE: ${AKL_INGESTION_PROCESS_JOBS_INLINE:-true}
    volumes:
      - ${AKL_SEAWEEDFS_AKL_ROOT:-/srv/seaweedfs/akl}:/data/object-storage
      - ingestion-jobs:/data/ingestion-jobs
      - ${AKL_INGESTION_REGISTRY_CLIENT_SECRET_FILE:-/srv/akl/env/svc-ingestion.client-secret}:/run/secrets/svc-ingestion-client-secret:ro
    depends_on:
