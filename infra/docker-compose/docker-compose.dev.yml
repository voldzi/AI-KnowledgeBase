name: ${COMPOSE_PROJECT_NAME:-akl}

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-platform-status-build: &platform-status-build
  context: ../..
  dockerfile: services/platform-infrastructure/Dockerfile

x-status-environment: &status-environment
  AKL_ENV: ${AKL_ENV:-development}
  AKL_AUTH_MODE: ${AKL_AUTH_MODE:-mock}
  AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-dev}
  AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
  PLATFORM_HOST: 0.0.0.0
  PLATFORM_PORT: 8080
  PLATFORM_READY_TIMEOUT_SECONDS: ${PLATFORM_READY_TIMEOUT_SECONDS:-2}

x-status-healthcheck: &status-healthcheck
  test:
    [
      "CMD-SHELL",
      "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()\"",
    ]
  interval: 20s
  timeout: 3s
  retries: 5
  start_period: 10s

services:
  reverse-proxy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    environment:
      AKL_PROXY_CONTAINER_PORT: ${AKL_PROXY_CONTAINER_PORT:-8080}
      PLATFORM_STATUS_UPSTREAM: ${PLATFORM_STATUS_UPSTREAM:-platform-status:8080}
      WEB_UPSTREAM: ${WEB_UPSTREAM:-web:3000}
      REGISTRY_UPSTREAM: ${REGISTRY_UPSTREAM:-registry-api:8000}
      INGESTION_UPSTREAM: ${INGESTION_UPSTREAM:-ingestion-service:8090}
      RAG_UPSTREAM: ${RAG_UPSTREAM:-rag-retrieval-service:8080}
      LLM_GATEWAY_UPSTREAM: ${LLM_GATEWAY_UPSTREAM:-llm-gateway-service:8080}
      EVALUATION_UPSTREAM: ${EVALUATION_UPSTREAM:-evaluation-service:8080}
      GOVERNANCE_UPSTREAM: ${GOVERNANCE_UPSTREAM:-governance-service:8080}
      GRAFANA_UPSTREAM: ${GRAFANA_UPSTREAM:-grafana:3000}
    ports:
      - "${AKL_PROXY_HTTP_PORT:-8080}:${AKL_PROXY_CONTAINER_PORT:-8080}"
    volumes:
      - ../reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      platform-status:
        condition: service_healthy
    networks:
      - public_zone
      - app_zone
      - management_zone
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:${AKL_PROXY_CONTAINER_PORT:-8080}/health >/dev/null 2>&1",
        ]
      interval: 20s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging: *json-logging

  platform-status:
    build: *platform-status-build
    image: ${PLATFORM_STATUS_IMAGE:-akl/platform-status:local}
    restart: unless-stopped
    environment:
      <<: *status-environment
      AKL_SERVICE_NAME: platform-infrastructure
      PLATFORM_READY_CHECKS: ${PLATFORM_READY_CHECKS:-}
    depends_on:
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
      opensearch:
        condition: service_started
      minio:
        condition: service_started
      keycloak:
        condition: service_started
      prometheus:
        condition: service_started
    networks:
      - app_zone
      - management_zone
    healthcheck: *status-healthcheck
    logging: *json-logging

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-akl}
      POSTGRES_USER: ${POSTGRES_USER:-akl_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-akl_local_postgres}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES:-akl_registry,akl_keycloak,akl_evaluation,akl_governance}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - data_zone
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *json-logging

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - data_zone
      - management_zone
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/6333' >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *json-logging

  opensearch:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2}
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "${OPENSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}"
    ports:
      - "${OPENSEARCH_HTTP_PORT:-9200}:9200"
      - "${OPENSEARCH_PERFORMANCE_ANALYZER_PORT:-9600}:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - data_zone
      - management_zone
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/9200' >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 40s
    logging: *json-logging

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-akl_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-akl_local_minio}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - data_zone
      - management_zone
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *json-logging

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:latest}
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/akl_keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-akl_platform}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-akl_local_postgres}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-akl_local_keycloak_admin}
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8081}:8080"
    volumes:
      - ../keycloak/realm-akl.json:/opt/keycloak/data/import/realm-akl.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_zone
      - data_zone
      - management_zone
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 5 bash -c '</dev/tcp/127.0.0.1/9000' >/dev/null 2>&1",
        ]
      interval: 20s
      timeout: 5s
      retries: 20
      start_period: 40s
    logging: *json-logging

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - app_zone
      - data_zone
      - management_zone
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9090/-/ready >/dev/null 2>&1"]
      interval: 20s
      timeout: 3s
      retries: 10
      start_period: 10s
    logging: *json-logging

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-akl_local_grafana_admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:8080/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - management_zone
    logging: *json-logging

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:latest}
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ../monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - management_zone
    logging: *json-logging

  ollama:
    profiles: ["ai"]
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ai_compute_zone
    logging: *json-logging

  web:
    build:
      context: ../../apps/web
    image: ${WEB_IMAGE:-akl/web:local}
    restart: unless-stopped
    environment:
      AKL_ENV: ${AKL_ENV:-development}
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-dev}
      AKL_API_CLIENT_MODE: ${AKL_API_CLIENT_MODE:-production}
      AKL_AUTH_MODE: ${AKL_WEB_AUTH_MODE:-mock}
      AKL_REGISTRY_API_BASE_URL: ${AKL_WEB_REGISTRY_API_BASE_URL:-http://registry-api:8000/api/v1}
      AKL_INGESTION_API_BASE_URL: ${AKL_WEB_INGESTION_API_BASE_URL:-http://ingestion-service:8090/api/v1}
      AKL_RAG_API_BASE_URL: ${AKL_WEB_RAG_API_BASE_URL:-http://rag-retrieval-service:8080/api/v1}
      AKL_GOVERNANCE_API_BASE_URL: ${AKL_WEB_GOVERNANCE_API_BASE_URL:-http://governance-service:8080/api/v1}
      AKL_EVALUATION_API_BASE_URL: ${AKL_WEB_EVALUATION_API_BASE_URL:-http://evaluation-service:8080/api/v1}
      AKL_WEB_STRATOS_AUTH_ME_URL: ${AKL_WEB_STRATOS_AUTH_ME_URL:-http://host.docker.internal:4000/api/v1/auth/me}
      AKL_WEB_STRATOS_ACCESS_TIMEOUT_MS: ${AKL_WEB_STRATOS_ACCESS_TIMEOUT_MS:-3000}
      AKL_WEB_STRATOS_ACCESS_CACHE_TTL_MS: ${AKL_WEB_STRATOS_ACCESS_CACHE_TTL_MS:-0}
      AKL_WEB_INGESTION_TOKEN_URL: ${AKL_WEB_INGESTION_TOKEN_URL:-}
      AKL_WEB_INGESTION_CLIENT_ID: ${AKL_WEB_INGESTION_CLIENT_ID:-svc-akb-web-ingestion}
      AKL_WEB_INGESTION_CLIENT_SECRET: ${AKL_WEB_INGESTION_CLIENT_SECRET:-}
      AKL_DEV_ACCESS_TOKEN: ${AKL_DEV_ACCESS_TOKEN:-}
      AKL_WEB_OBJECT_STORAGE_ROOT: /data/object-storage
      AKL_WEB_UPLOAD_BUCKET: ${AKL_WEB_UPLOAD_BUCKET:-akl-documents}
      AKL_WEB_UPLOAD_SIGNING_SECRET: ${AKL_WEB_UPLOAD_SIGNING_SECRET:-akl_local_upload_signing_secret}
      AKL_WEB_UPLOAD_MAX_FILE_BYTES: ${AKL_WEB_UPLOAD_MAX_FILE_BYTES:-52428800}
      AKL_WEB_BUDGET_UPLOAD_MAX_FILE_BYTES: ${AKL_WEB_BUDGET_UPLOAD_MAX_FILE_BYTES:-134217728}
      AKL_WEB_STRATOS_BUDGET_SERVICE_RATE_LIMIT: ${AKL_WEB_STRATOS_BUDGET_SERVICE_RATE_LIMIT:-300}
      AKL_WEB_STRATOS_BUDGET_SERVICE_RATE_WINDOW_SECONDS: ${AKL_WEB_STRATOS_BUDGET_SERVICE_RATE_WINDOW_SECONDS:-60}
      AKL_PUBLIC_DELIVERY_INTERNAL_TOKEN: ${AKL_PUBLIC_DELIVERY_INTERNAL_TOKEN:-replace-with-shared-public-delivery-token-at-least-32-chars}
      AKL_PUBLIC_RATE_WINDOW_MS: ${AKL_PUBLIC_RATE_WINDOW_MS:-60000}
      AKL_PUBLIC_RATE_PER_CLIENT_SLUG: ${AKL_PUBLIC_RATE_PER_CLIENT_SLUG:-30}
      AKL_PUBLIC_RATE_GLOBAL: ${AKL_PUBLIC_RATE_GLOBAL:-600}
      AKL_PUBLIC_CONCURRENCY_PER_CLIENT: ${AKL_PUBLIC_CONCURRENCY_PER_CLIENT:-2}
      AKL_PUBLIC_CONCURRENCY_GLOBAL: ${AKL_PUBLIC_CONCURRENCY_GLOBAL:-24}
      AKL_PUBLIC_LIMITER_MAX_KEYS: ${AKL_PUBLIC_LIMITER_MAX_KEYS:-10000}
      AKL_PUBLIC_TRUSTED_PROXY_HOPS: ${AKL_PUBLIC_TRUSTED_PROXY_HOPS:-0}
      AKL_PUBLIC_CLIENT_KEY_SECRET: ${AKL_PUBLIC_CLIENT_KEY_SECRET:-}
      AKL_WEB_DEV_SUBJECT: ${AKL_WEB_DEV_SUBJECT:-user_dev}
      AKL_WEB_DEV_ROLES: ${AKL_WEB_DEV_ROLES:-admin,document_manager,reader}
      AKL_WEB_DEV_GROUPS: ${AKL_WEB_DEV_GROUPS:-}
      AKL_WEB_DEV_CAPABILITIES: ${AKL_WEB_DEV_CAPABILITIES:-}
      AKL_WEB_DEV_SCOPES: ${AKL_WEB_DEV_SCOPES:-}
      AKL_WEB_DEV_ORGANIZATION_ID: ${AKL_WEB_DEV_ORGANIZATION_ID:-org_stratos}
      PORT: 3000
    ports:
      - "${WEB_PORT:-3002}:3000"
    volumes:
      - ingestion-object-storage:/data/object-storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://$${HOSTNAME}:3000/health >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      registry-api:
        condition: service_healthy
      ingestion-service:
        condition: service_healthy
      rag-retrieval-service:
        condition: service_healthy
      governance-service:
        condition: service_started
    networks:
      - app_zone
    logging: *json-logging

  registry-api:
    build:
      context: ../../services/registry-api
    image: ${REGISTRY_API_IMAGE:-akl/registry-api:local}
    restart: unless-stopped
    environment:
      AKL_ENV: ${AKL_ENV:-development}
      AKL_SERVICE_NAME: registry-api
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-dev}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_REGISTRY_AUTH_MODE:-mock}
      AKL_DATABASE_URL: ${AKL_REGISTRY_DATABASE_URL:-postgresql+psycopg://akl_platform:${POSTGRES_PASSWORD:-akl_local_postgres}@postgres:5432/akl_registry}
      AKL_AUTO_CREATE_SCHEMA: ${AKL_REGISTRY_AUTO_CREATE_SCHEMA:-true}
      AKL_MOCK_SUBJECT: ${AKL_MOCK_SUBJECT:-user_dev}
      AKL_MOCK_ROLES: ${AKL_MOCK_ROLES:-["admin"]}
      AKL_TRUSTED_SERVICE_CLIENT_IDS: ${AKL_REGISTRY_TRUSTED_SERVICE_CLIENT_IDS:-akb-rag-service,aiip-document-service,stratos-akb-service,svc-ingestion}
      AKL_SERVICE_CLIENT_ROUTE_GRANTS: ${AKL_REGISTRY_SERVICE_CLIENT_ROUTE_GRANTS:-akb-rag-service=authz|audit|idempotency,aiip-document-service=aiip-upload,stratos-akb-service=stratos-budget-upload,svc-ingestion=authz|audit|documents-read|ingestion-status}
      AKL_SERVICE_CLIENT_DELEGATIONS: ${AKL_REGISTRY_SERVICE_CLIENT_DELEGATIONS:-akb-rag-service=aiip-service}
      AKL_STRATOS_AUTH_ME_URL: ${AKL_STRATOS_AUTH_ME_URL:-http://host.docker.internal:4000/api/v1/auth/me}
      AKL_STRATOS_POLICY_BINDINGS_URL: ${AKL_STRATOS_POLICY_BINDINGS_URL:-http://host.docker.internal:4000/api/v1/policy/bindings}
      AKL_STRATOS_POLICY_DECISIONS_URL: ${AKL_STRATOS_POLICY_DECISIONS_URL:-http://host.docker.internal:4000/api/v1/policy/decisions}
      AKL_STRATOS_INFORMATION_RESOURCES_URL: ${AKL_STRATOS_INFORMATION_RESOURCES_URL:-http://host.docker.internal:4000/api/v1/information/resources}
      AKL_STRATOS_AIIP_AKB_RESOURCES_URL: ${AKL_STRATOS_AIIP_AKB_RESOURCES_URL:-http://host.docker.internal:4000/api/v1/integrations/aiip/akb/resources}
      AKL_STRATOS_BUDGET_AKB_RESOURCES_URL: ${AKL_STRATOS_BUDGET_AKB_RESOURCES_URL:-http://host.docker.internal:4000/api/v1/integrations/budget/akb/resources}
      AKL_STRATOS_INFORMATION_PUBLICATIONS_URL: ${AKL_STRATOS_INFORMATION_PUBLICATIONS_URL:-http://host.docker.internal:4000/api/v1/information/publications}
      AKL_STRATOS_PUBLIC_DECISIONS_URL: ${AKL_STRATOS_PUBLIC_DECISIONS_URL:-http://host.docker.internal:4000/api/v1/policy/public-decisions}
      AKB_POLICY_SERVICE_TOKEN: ${AKB_POLICY_SERVICE_TOKEN:-}
      AKB_AIIP_INGEST_SERVICE_TOKEN: ${AKB_AIIP_INGEST_SERVICE_TOKEN:-}
      AKL_PUBLIC_DELIVERY_INTERNAL_TOKEN: ${AKL_PUBLIC_DELIVERY_INTERNAL_TOKEN:-replace-with-shared-public-delivery-token-at-least-32-chars}
      AKL_PUBLIC_AUDIT_WINDOW_SECONDS: ${AKL_PUBLIC_AUDIT_WINDOW_SECONDS:-60}
      AKL_PUBLIC_AUDIT_RETENTION_DAYS: ${AKL_PUBLIC_AUDIT_RETENTION_DAYS:-90}
      AKL_PUBLIC_AUDIT_PRUNE_INTERVAL_SECONDS: ${AKL_PUBLIC_AUDIT_PRUNE_INTERVAL_SECONDS:-3600}
      AKL_ASSISTANT_CONVERSATION_RETENTION_DAYS: ${AKL_ASSISTANT_CONVERSATION_RETENTION_DAYS:-180}
      AKL_ASSISTANT_PURGE_ENABLED: ${AKL_ASSISTANT_PURGE_ENABLED:-true}
      AKL_ASSISTANT_PURGE_INTERVAL_SECONDS: ${AKL_ASSISTANT_PURGE_INTERVAL_SECONDS:-3600}
      AKL_ASSISTANT_PURGE_BATCH_SIZE: ${AKL_ASSISTANT_PURGE_BATCH_SIZE:-500}
      AKL_ASSISTANT_DELETION_AUDIT_RETENTION_DAYS: ${AKL_ASSISTANT_DELETION_AUDIT_RETENTION_DAYS:-730}
      AKL_REGISTRY_PUBLIC_RATE_WINDOW_MS: ${AKL_REGISTRY_PUBLIC_RATE_WINDOW_MS:-60000}
      AKL_REGISTRY_PUBLIC_RATE_PER_CLIENT_SLUG: ${AKL_REGISTRY_PUBLIC_RATE_PER_CLIENT_SLUG:-600}
      AKL_REGISTRY_PUBLIC_RATE_GLOBAL: ${AKL_REGISTRY_PUBLIC_RATE_GLOBAL:-1200}
      AKL_REGISTRY_PUBLIC_CONCURRENCY_PER_CLIENT: ${AKL_REGISTRY_PUBLIC_CONCURRENCY_PER_CLIENT:-32}
      AKL_REGISTRY_PUBLIC_CONCURRENCY_GLOBAL: ${AKL_REGISTRY_PUBLIC_CONCURRENCY_GLOBAL:-64}
      AKL_REGISTRY_PUBLIC_LIMITER_MAX_KEYS: ${AKL_REGISTRY_PUBLIC_LIMITER_MAX_KEYS:-10000}
      AKL_REGISTRY_PUBLIC_TRUSTED_PROXY_HOPS: ${AKL_REGISTRY_PUBLIC_TRUSTED_PROXY_HOPS:-0}
      AKL_PUBLIC_CLIENT_KEY_SECRET: ${AKL_PUBLIC_CLIENT_KEY_SECRET:-}
      AKL_STRATOS_ACCESS_TIMEOUT_SECONDS: ${AKL_STRATOS_ACCESS_TIMEOUT_SECONDS:-3}
      AKL_STRATOS_ACCESS_CACHE_TTL_SECONDS: ${AKL_STRATOS_ACCESS_CACHE_TTL_SECONDS:-0}
      AKL_INGESTION_AUTHORIZATION_SECRET: ${AKL_INGESTION_AUTHORIZATION_SECRET:-akb-local-ingestion-authorization-secret-change-me}
      AKL_INGESTION_AUTHORIZATION_TTL_SECONDS: ${AKL_INGESTION_AUTHORIZATION_TTL_SECONDS:-60}
    ports:
      - "${REGISTRY_API_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_zone
      - data_zone
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 20s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging: *json-logging

  ingestion-service:
    build:
      context: ../../services/ingestion-service
    image: ${INGESTION_SERVICE_IMAGE:-akl/ingestion-service:local}
    restart: unless-stopped
    environment:
      AKL_ENV: ${AKL_ENV:-development}
      AKL_SERVICE_NAME: ingestion-service
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-dev}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_INGESTION_AUTH_MODE:-mock}
      AKL_OIDC_ISSUER: ${AKL_OIDC_ISSUER:-http://keycloak:8080/realms/stratos}
      AKL_OIDC_AUDIENCE: ${AKL_OIDC_AUDIENCE:-akl-api}
      AKL_OIDC_JWKS_URL: ${AKL_OIDC_JWKS_URL:-http://keycloak:8080/realms/stratos/protocol/openid-connect/certs}
      AKL_SERVICE_ACCOUNT_SUBJECT: ${AKL_INGESTION_SERVICE_ACCOUNT_SUBJECT:-svc-ingestion}
      AKL_SERVICE_ACCOUNT_ROLES: ${AKL_INGESTION_SERVICE_ACCOUNT_ROLES:-service_ingestion,document_manager}
      AKL_INGESTION_WEB_CLIENT_ID: ${AKL_INGESTION_WEB_CLIENT_ID:-svc-akb-web-ingestion}
      AKL_INGESTION_WEB_ROLE: ${AKL_INGESTION_WEB_ROLE:-service_akb_web_ingestion}
      AKL_INGESTION_REGISTRY_CLIENT_MODE: ${AKL_INGESTION_REGISTRY_CLIENT_MODE:-http}
      AKL_REGISTRY_API_BASE_URL: ${AKL_INGESTION_REGISTRY_API_BASE_URL:-http://registry-api:8000}
      AKL_REGISTRY_SERVICE_TOKEN_URL: ${AKL_INGESTION_REGISTRY_TOKEN_URL:-}
      AKL_REGISTRY_SERVICE_CLIENT_ID: ${AKL_INGESTION_REGISTRY_CLIENT_ID:-}
