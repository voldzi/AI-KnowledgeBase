  llm-gateway-service:
    build:
      context: ../../services/llm-gateway-service
    image: ${LLM_GATEWAY_SERVICE_IMAGE:-akl/llm-gateway-service:local}
    restart: unless-stopped
    environment:
      AKL_ENV: ${AKL_ENV:-development}
      AKL_SERVICE_NAME: llm-gateway-service
      AKL_SERVICE_VERSION: ${AKL_SERVICE_VERSION:-dev}
      AKL_LOG_LEVEL: ${AKL_LOG_LEVEL:-INFO}
      AKL_AUTH_MODE: ${AKL_LLM_AUTH_MODE:-mock}
      AKL_SERVICE_TOKEN: ${AKL_LLM_GATEWAY_SERVICE_TOKEN:-}
      AKL_LLM_REQUIRE_CALLER_IDENTITY: ${AKL_LLM_REQUIRE_CALLER_IDENTITY:-false}
      AKL_LLM_GATEWAY_AUDIENCE: ${AKL_LLM_GATEWAY_AUDIENCE:-llm-gateway-service}
      AKL_LLM_GATEWAY_ALLOWED_CALLER_ROLES: ${AKL_LLM_GATEWAY_ALLOWED_CALLER_ROLES:-service_ingestion,service_rag}
      AKL_LLM_DEFAULT_PROVIDER: ${AKL_LLM_DEFAULT_PROVIDER:-ollama}
      AKL_LLM_ENABLED_PROVIDERS: ${AKL_LLM_ENABLED_PROVIDERS:-mock,ollama}
      AKL_LLM_MODEL_PROVIDER_MAP: ${AKL_LLM_MODEL_PROVIDER_MAP:-{"gemma4:12b-mlx":"ollama","gemma4:31b-mlx":"ollama","bge-m3":"ollama","qwen3-embedding:8b":"ollama","mock-chat":"mock","mock-embedding":"mock"}}
      AKL_LLM_DEFAULT_CHAT_MODEL: ${AKL_LLM_DEFAULT_CHAT_MODEL:-gemma4:12b-mlx}
      AKL_LLM_CHAT_MODEL_FALLBACKS: ${AKL_LLM_CHAT_MODEL_FALLBACKS:-{"gemma4:31b-mlx":["gemma4:12b-mlx"]}}
      AKL_LLM_DEFAULT_EMBEDDING_MODEL: ${AKL_LLM_DEFAULT_EMBEDDING_MODEL:-bge-m3}
      AKL_LLM_DEFAULT_EMBEDDING_DIMENSIONS: ${AKL_LLM_DEFAULT_EMBEDDING_DIMENSIONS:-}
      AKL_LLM_DEFAULT_MAX_TOKENS: ${AKL_LLM_DEFAULT_MAX_TOKENS:-512}
      AKL_LLM_ALLOW_MODEL_PULL: ${AKL_LLM_ALLOW_MODEL_PULL:-false}
      AKL_LLM_ALLOW_MODEL_DELETE: ${AKL_LLM_ALLOW_MODEL_DELETE:-false}
      AKL_LLM_MODEL_PULL_TIMEOUT_SECONDS: ${AKL_LLM_MODEL_PULL_TIMEOUT_SECONDS:-1800}
      AKL_LLM_REQUEST_TIMEOUT_SECONDS: ${AKL_LLM_REQUEST_TIMEOUT_SECONDS:-30}
      AKL_LLM_RETRY_ATTEMPTS: ${AKL_LLM_RETRY_ATTEMPTS:-2}
      AKL_LLM_RETRY_BACKOFF_SECONDS: ${AKL_LLM_RETRY_BACKOFF_SECONDS:-0.25}
      AKL_OLLAMA_BASE_URL: ${AKL_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      AKL_OLLAMA_BASE_URLS: ${AKL_OLLAMA_BASE_URLS:-http://host.docker.internal:11434}
      AKL_OLLAMA_THINK: ${AKL_OLLAMA_THINK:-false}
      AKL_OPENAI_COMPAT_BASE_URL: ${AKL_OPENAI_COMPAT_BASE_URL:-http://vllm:8000}
      AKL_OPENAI_COMPAT_API_KEY: ${AKL_OPENAI_COMPAT_API_KEY:-}
      AKL_MOCK_CHAT_RESPONSE: ${AKL_MOCK_CHAT_RESPONSE:-Mock response generated by LLM Gateway.}
      AKL_MOCK_EMBEDDING_DIMENSIONS: ${AKL_MOCK_EMBEDDING_DIMENSIONS:-1024}
    ports:
      - "${LLM_GATEWAY_SERVICE_PORT:-8083}:8080"
    depends_on:
      ollama:
        condition: service_started
        required: false
    networks:
      - app_zone
      - ai_compute_zone
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()\"",
        ]
      interval: 20s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging: *json-logging

