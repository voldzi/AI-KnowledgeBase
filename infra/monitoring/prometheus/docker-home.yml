global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: platform-status
    metrics_path: /metrics
    static_configs:
      - targets:
          - platform-status:8080

  - job_name: reverse-proxy
    metrics_path: /metrics
    static_configs:
      - targets:
          - reverse-proxy:2019

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets:
          - qdrant:6333

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets:
          - otel-collector:9464

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100
